<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTrend · 뉴스 트렌드 맵</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3-cloud/1.2.7/d3.layout.cloud.min.js"></script>
<style>
  :root{--bg:#0b0e16;--panel:#141824;--panel2:#1c2130;--line:#2a3142;--txt:#e8eaf0;
    --muted:#94a0b8;--accent:#5b8cff;--ok:#34d399;--err:#fb7185;--search:#e879f9;
    --stage:#0b0e16;--stageInk:#eef1f8;--stageStroke:#0b0e16;--card:#171c28;}
  :root[data-theme="light"]{--bg:#eef1f7;--panel:#ffffff;--panel2:#f1f4fa;--line:#dde3ee;
    --txt:#1a2030;--muted:#5b6678;--accent:#3b6ef5;--card:#ffffff;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    background:var(--bg);color:var(--txt);font-size:14px;transition:background .2s,color .2s}
  header{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--line);
    background:var(--panel)}
  header h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.3px}
  header .sub{color:var(--muted);font-size:12px}
  header .right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .langtog{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .langtog button{background:transparent;color:var(--muted);border:none;padding:5px 10px;font-size:12px;
    font-weight:700;cursor:pointer}
  .langtog button.on{background:var(--accent);color:#fff}
  .srcstat{font-size:12px;color:var(--muted)}
  .regionbar{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--line)}
  .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{background:transparent;border:none;color:var(--muted);padding:7px 18px;font-size:13px;
    font-weight:700;cursor:pointer;border-radius:7px;display:flex;align-items:center;gap:6px}
  .seg button.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(91,140,255,.4)}
  .regionbar .hint{color:var(--muted);font-size:12px}
  .wrap{display:flex;min-height:calc(100vh - 104px)}
  aside{width:296px;flex-shrink:0;border-right:1px solid var(--line);background:var(--panel);
    padding:16px;overflow-y:auto;max-height:calc(100vh - 104px);position:sticky;top:0}
  main{flex:1;display:flex;flex-direction:column;min-width:0}
  .sec{margin-bottom:18px}
  .sec h3{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 8px;font-weight:800}
  label.row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0;cursor:pointer}
  label.row span{font-size:13px}label.row.dim{opacity:.45}
  input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent)}
  .chip{display:inline-flex;align-items:center;gap:6px}.dot{width:9px;height:9px;border-radius:50%}
  .badge{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--panel2);color:var(--muted)}
  .badge.on{background:rgba(52,211,153,.15);color:var(--ok)}.badge.off{background:rgba(251,113,133,.12);color:var(--err)}
  input[type=range]{width:100%;accent-color:var(--accent)}.val{color:var(--accent);font-weight:800}
  .field{margin-bottom:10px}.field>div:first-child{font-size:12px;color:var(--muted);margin-bottom:4px}
  button.run{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px;
    font-size:14px;font-weight:800;cursor:pointer;margin-top:4px}button.run:hover{filter:brightness(1.08)}
  button.run:disabled{opacity:.55;cursor:not-allowed}
  button.ghost{width:100%;background:var(--panel2);color:var(--txt);border:1px solid var(--line);
    border-radius:9px;padding:9px;font-size:13px;cursor:pointer;margin-top:8px}
  .searchbox{display:flex;gap:6px}
  .searchbox input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    padding:8px 10px;color:var(--txt);font-size:13px;font-family:inherit}
  .searchbox button{background:var(--search);border:none;color:#1a0b1f;font-weight:800;border-radius:8px;
    padding:0 14px;cursor:pointer;font-size:13px}
  .kwchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .kwchip{display:inline-flex;align-items:center;gap:6px;background:rgba(232,121,249,.13);color:var(--search);
    border:1px solid rgba(232,121,249,.35);border-radius:14px;padding:3px 6px 3px 10px;font-size:12px;cursor:pointer}
  .kwchip b{font-weight:700}.kwchip .x{cursor:pointer;opacity:.7;font-weight:800}.kwchip .x:hover{opacity:1}
  .tabs{display:flex;gap:4px;padding:10px 16px 0;border-bottom:1px solid var(--line)}
  .tab{padding:9px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-radius:8px 8px 0 0;
    border:1px solid transparent;border-bottom:none;font-weight:700}
  .tab.active{color:var(--txt);background:var(--panel);border-color:var(--line)}
  .legend{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:8px 16px;font-size:12px;border-bottom:1px solid var(--line)}
  .cmode{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:2px;margin-right:4px}
  .cmode button{background:transparent;border:none;color:var(--muted);padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;border-radius:6px}
  .cmode button.on{background:var(--accent);color:#fff}
  .view{flex:1;position:relative;overflow:hidden;background:var(--stage)}
  /* 헤더 KPI 카드 */
  .kpis{display:flex;gap:10px;padding:10px 20px;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap}
  .kpi{display:flex;flex-direction:column;gap:2px;min-width:96px;padding:8px 12px;background:var(--card);
    border:1px solid var(--line);border-radius:10px}
  .kpi .kv{font-size:20px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .kpi .kl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .kpi.sent .kv{display:flex;align-items:center;gap:6px}
  .gauge{width:54px;height:6px;border-radius:4px;background:linear-gradient(90deg,var(--err),#9aa3b5,var(--ok));position:relative}
  .gauge i{position:absolute;top:-3px;width:3px;height:12px;background:var(--txt);border-radius:2px;transform:translateX(-50%)}
  .iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;
    width:34px;height:30px;cursor:pointer;font-size:15px}
  .pane{position:absolute;inset:0;display:none}.pane.active{display:block}
  #netSvg,#bubbleSvg,#cloudSvg,#treeSvg{width:100%;height:100%;display:block}
  .status{padding:8px 16px;font-size:12px;color:var(--muted);border-top:1px solid var(--line);
    display:flex;align-items:center;gap:10px;min-height:34px;background:var(--panel)}
  .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--muted);gap:10px;text-align:center;padding:20px}.empty b{color:var(--txt);font-size:15px}
  .spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;
    animation:sp .7s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
  .tooltip{position:fixed;pointer-events:none;background:#0b0d13;border:1px solid var(--line);border-radius:8px;
    padding:8px 11px;font-size:12px;z-index:60;display:none;max-width:320px;line-height:1.5}.tooltip b{color:var(--accent)}
  .barpanel{position:absolute;right:14px;top:14px;width:220px;background:rgba(11,14,22,.82);border:1px solid var(--line);
    border-radius:12px;padding:12px;backdrop-filter:blur(6px)}
  .barpanel h4{margin:0 0 8px;font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase}
  .bar{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px}
  .bar .bx{height:14px;border-radius:3px;min-width:3px}.bar .bn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .bc{color:var(--muted);font-variant-numeric:tabular-nums}
  /* 검색 결과 슬라이드 패널 */
  .results{position:fixed;top:0;right:0;height:100vh;width:380px;background:var(--panel);border-left:1px solid var(--line);
    transform:translateX(100%);transition:transform .25s ease;z-index:70;display:flex;flex-direction:column;box-shadow:-12px 0 30px rgba(0,0,0,.4)}
  .results.open{transform:translateX(0)}
  .results header{border-bottom:1px solid var(--line);padding:14px 16px;backdrop-filter:none;background:transparent}
  .results h3{margin:0;font-size:14px;font-weight:800}
  .results .close{margin-left:auto;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
  .results .body{flex:1;overflow-y:auto;padding:8px 12px}
  .artitem{display:block;padding:10px 8px;border-bottom:1px solid var(--line);text-decoration:none;color:var(--txt)}
  .artitem:hover{background:var(--panel2)}.artitem .t{font-size:13px;font-weight:600;line-height:1.4}
  .artitem .m{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:8px}
  .results .foot{padding:12px 16px;border-top:1px solid var(--line)}
  .results .foot button{width:100%;background:var(--search);color:#1a0b1f;border:none;border-radius:9px;
    padding:10px;font-weight:800;cursor:pointer}
  /* 급상승 리스트 */
  #risingWrap{position:absolute;inset:0;overflow-y:auto;padding:16px 20px}
  .rise{display:flex;align-items:center;gap:12px;padding:10px 12px;margin:6px 0;border:1px solid var(--line);
    border-radius:10px;background:var(--panel2)}
  .rise .rk{width:26px;text-align:center;font-weight:800;color:var(--muted);font-size:13px}
  .rise .nm{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;min-width:120px}
  .rise .nm .dot{width:10px;height:10px}
  .rise .new{font-size:10px;font-weight:800;background:var(--search);color:#1a0b1f;border-radius:6px;padding:1px 6px}
  .rise .track{flex:1;height:8px;background:#0b0e16;border-radius:5px;overflow:hidden}
  .rise .track i{display:block;height:100%;border-radius:5px}
  .rise .met{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:120px;text-align:right}
  .rise .sc{font-weight:800;color:var(--ok)}
  /* 키워드 상세 드로어 */
  #kwDrawer .body{padding:14px 16px}
  .kwstat{display:flex;gap:10px;margin-bottom:14px}
  .kwstat>div{flex:1;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .kwstat .kl{font-size:11px;color:var(--muted)}
  .kwstat .kvv{font-size:16px;font-weight:800;margin-top:2px}
  .kwsec{margin-bottom:16px}
  .kwsec>.kl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;font-weight:700}
  .relwrap{display:flex;flex-wrap:wrap;gap:6px}
  .kwchip.rel{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .kwchip.rel b{color:var(--accent);margin-left:4px}
</style>
</head>
<body>
<header>
  <h1>📡 MyTrend</h1>
  <span class="sub" data-i18n="subtitle"></span>
  <div class="right">
    <span class="srcstat" id="hdrStat"></span>
    <button class="iconbtn" id="themeBtn" title="theme">🌙</button>
    <div class="langtog">
      <button data-lang="ko">KO</button><button data-lang="en">EN</button>
    </div>
  </div>
</header>
<div class="kpis" id="kpis">
  <div class="kpi"><div class="kv" id="kpiArticles">–</div><div class="kl" data-i18n="kpi_articles"></div></div>
  <div class="kpi"><div class="kv" id="kpiKeywords">–</div><div class="kl" data-i18n="kpi_keywords"></div></div>
  <div class="kpi"><div class="kv" id="kpiClusters">–</div><div class="kl" data-i18n="kpi_clusters"></div></div>
  <div class="kpi"><div class="kv" id="kpiSources">–</div><div class="kl" data-i18n="kpi_sources"></div></div>
  <div class="kpi sent"><div class="kv" id="kpiSent"><span id="kpiSentTxt">–</span><span class="gauge"><i id="kpiSentNeedle" style="left:50%"></i></span></div><div class="kl" data-i18n="kpi_sentiment"></div></div>
</div>

<div class="regionbar">
  <span class="hint" data-i18n="region_label"></span>
  <div class="seg" id="regionSeg">
    <button data-region="KR"   data-i18n="region_kr"></button>
    <button data-region="US"   data-i18n="region_global"></button>
    <button data-region="ALL"  class="on" data-i18n="region_all"></button>
  </div>
</div>

<div class="wrap">
  <aside>
    <div class="sec"><h3 data-i18n="h_search"></h3>
      <div class="searchbox">
        <input id="kwInput" data-i18n-ph="search_ph">
        <button id="kwBtn" data-i18n="btn_search"></button>
      </div>
      <div class="kwchips" id="kwChips"></div>
    </div>
    <div class="sec"><h3 data-i18n="h_cats"></h3><div id="cats"></div></div>
    <div class="sec"><h3 data-i18n="h_sources"></h3><div id="sources"></div></div>
    <div class="sec"><h3 data-i18n="h_settings"></h3>
      <div class="field"><div><span data-i18n="s_hours"></span> <span class="val" id="hoursVal">24</span><span data-i18n="unit_h"></span></div>
        <input type="range" id="hours" min="3" max="72" value="24"></div>
      <div class="field"><div><span data-i18n="s_minfreq"></span> <span class="val" id="minFreqVal">2</span></div>
        <input type="range" id="minFreq" min="1" max="8" value="2"></div>
      <div class="field"><div><span data-i18n="s_maxkw"></span> <span class="val" id="maxKwVal">80</span></div>
        <input type="range" id="maxKw" min="20" max="200" step="10" value="80"></div>
      <div class="field"><div><span data-i18n="s_count"></span> <span class="val" id="perFeedVal">50</span></div>
        <input type="range" id="perFeed" min="10" max="100" step="5" value="50"></div>
    </div>
    <button class="run" id="run" data-i18n="btn_generate"></button>
    <button class="ghost" id="ingest" data-i18n="btn_ingest"></button>
    <button class="ghost" id="export" data-i18n="btn_export"></button>
  </aside>

  <main>
    <div class="tabs">
      <div class="tab active" data-v="net" data-i18n="tab_net"></div>
      <div class="tab" data-v="cloud" data-i18n="tab_cloud"></div>
      <div class="tab" data-v="bubble" data-i18n="tab_bubble"></div>
      <div class="tab" data-v="tree" data-i18n="tab_tree"></div>
      <div class="tab" data-v="rising" data-i18n="tab_rising"></div>
    </div>
    <div class="legend" id="legend"></div>
    <div class="view">
      <div class="pane active" data-v="net">
        <svg id="netSvg"></svg>
        <div class="barpanel"><h4 data-i18n="top_kw"></h4><div id="topList"></div></div>
        <div class="empty" id="netEmpty"><b data-i18n="empty_title"></b><span data-i18n="empty_desc"></span></div>
      </div>
      <div class="pane" data-v="cloud"><svg id="cloudSvg"></svg></div>
      <div class="pane" data-v="bubble"><svg id="bubbleSvg"></svg></div>
      <div class="pane" data-v="tree"><svg id="treeSvg"></svg></div>
      <div class="pane" data-v="rising"><div id="risingWrap"></div></div>
    </div>
    <div class="status" id="status"></div>
  </main>
</div>

<div class="results" id="results">
  <header style="display:flex;align-items:center"><h3 id="resTitle"></h3><button class="close" id="resClose">×</button></header>
  <div class="body" id="resBody"></div>
  <div class="foot"><button id="resMerge" data-i18n="btn_merge"></button></div>
</div>
<div class="results kwd" id="kwDrawer">
  <header style="display:flex;align-items:center"><h3 id="kwTitle"></h3><button class="close" id="kwClose">×</button></header>
  <div class="body" id="kwBody"></div>
</div>
<div class="tooltip" id="tip"></div>

    st_searching:"Searching ‘{q}’…",st_ingesting:"Fetching from all sources…",
    st_nokw:"No keywords found. Adjust window/frequency or try search/refetch.",
    st_pickcat:"⚠️ Select at least one category.",
    st_done:"{a} articles · {k} keywords · {l} links · {c} · morph {kiwi} · {t}",
    st_search_done:"{n} results for ‘{q}’",st_merged:"Added {n} ‘{q}’ articles to the trend map",
    src_active:"{a}/{b} sources active",cache:{hit:"cache",miss:"DB",backfill:"live-fetch"},
    conn_err:"❌ Cannot reach backend. Start the server first.",no_results:"No results."},
};
let lang=localStorage.getItem("mt_lang")||"ko";
let theme=localStorage.getItem("mt_theme")||"dark";
function applyTheme(){document.documentElement.dataset.theme=theme;
  const b=document.getElementById("themeBtn");if(b)b.textContent=theme==="dark"?"🌙":"☀️";}
const t=(k,vars={})=>{let s=STR[lang][k]??k;for(const v in vars)s=s.replaceAll("{"+v+"}",vars[v]);return s;};
function applyLang(){
  document.documentElement.lang=lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>el.placeholder=t(el.dataset.i18nPh));
  document.querySelectorAll(".langtog button").forEach(b=>b.classList.toggle("on",b.dataset.lang===lang));
  if(CFG)renderControls();
  renderChips();
  if(lastData){redraw();}
  if(!lastData)setStatus(t("st_ready"));
}

//════════════════ 상태/공통 ════════════════
const API=location.origin.startsWith("http")?"":"http://localhost:8000";
const $=id=>document.getElementById(id);
let CFG=null,CATS=[],REGIONS=[],SOURCES=[];
let region="ALL",lastData=null,searchKw=[],lastSearch=null;
const colorOf=id=>(CATS.find(c=>c.id===id)||{color:"#94a0b8"}).color;
const catLabel=id=>{const c=CATS.find(x=>x.id===id);return c?(lang==="ko"?c.ko:c.en):id;};
// 색상 모드: 분야(cat) / 토픽군집(cluster) / 감성(sentiment)
const CLUSTER_COLORS=["#5b8cff","#34d399","#f59e0b","#a78bfa","#fb7185","#38bdf8","#facc15","#2dd4bf","#f472b6","#c084fc","#fb923c","#4ade80"];
let colorMode=localStorage.getItem("mt_colormode")||"cat";
let clusterColorMap={};
function buildClusterColors(data){clusterColorMap={};(data&&data.clusters||[]).forEach((cl,i)=>{clusterColorMap[cl.id]=CLUSTER_COLORS[i%CLUSTER_COLORS.length];});}
function sentColor(s){const g="#9aa3b5";
  if(s>0.05)return d3.interpolateRgb(g,"#34d399")(Math.min(1,s));
  if(s<-0.05)return d3.interpolateRgb(g,"#fb7185")(Math.min(1,-s));return g;}
function nodeColor(d){
  if(colorMode==="cluster")return clusterColorMap[d.cluster]||"#6b7280";
  if(colorMode==="sentiment")return sentColor(d.sent||0);
  return colorOf(d.cat);}
const regionIds=()=>region==="ALL"?["KR","US"]:[region];

const tip=$("tip");
const showTip=(h,e)=>{tip.innerHTML=h;tip.style.display="block";moveTip(e);};
const moveTip=e=>{tip.style.left=Math.min(e.clientX+14,innerWidth-330)+"px";tip.style.top=(e.clientY+14)+"px";};
const hideTip=()=>tip.style.display="none";
const bind=(id,vid)=>{const s=$(id),v=$(vid);s.addEventListener("input",()=>v.textContent=s.value);};
bind("hours","hoursVal");bind("minFreq","minFreqVal");bind("maxKw","maxKwVal");bind("perFeed","perFeedVal");
function setStatus(html,busy){$("status").innerHTML=(busy?'<span class="spin"></span>':"")+html;}
function updateKPIs(data){
  $("kpiArticles").textContent=data?data.articleCount:"–";
  $("kpiKeywords").textContent=data?data.kws.length:"–";
  $("kpiClusters").textContent=data&&data.clusters?data.clusters.length:"–";
  $("kpiSources").textContent=SOURCES.filter(s=>s.enabled).length;
  const so=data?(data.sentimentOverall||0):0;
  $("kpiSentTxt").innerHTML=data?`${sentArrow(so)} ${so.toFixed(2)}`:"–";
  $("kpiSentNeedle").style.left=`${Math.round((so+1)/2*100)}%`;
}

//════════════════ 초기화 ════════════════
async function init(){
  try{
    CFG=await fetch(API+"/api/config").then(r=>r.json());
    CATS=CFG.categories;REGIONS=CFG.regions;SOURCES=CFG.sources;
    $("hours").value=CFG.settings.default_hours;$("hoursVal").textContent=CFG.settings.default_hours;
    renderControls();applyLang();
    $("hdrStat").textContent=t("src_active",{a:SOURCES.filter(s=>s.enabled).length,b:SOURCES.length});
  }catch(e){applyLang();setStatus(t("conn_err"));}
}
function renderControls(){
  const sel=CATS.filter(c=>c.selectable!==false);
  const DEFAULT_CATS=["BUSINESS","NATION","SCIENCE","TECHNOLOGY"];
  $("cats").innerHTML=sel.map(c=>{
    const def=DEFAULT_CATS.includes(c.id),L=lang==="ko"?c.ko:c.en;
    return `<label class="row"><span class="chip"><span class="dot" style="background:${c.color}"></span>${L}</span>
      <input type="checkbox" class="cat" value="${c.id}" ${def?"checked":""}></label>`;}).join("");
  $("sources").innerHTML=SOURCES.map(s=>{
    const badge=s.enabled?`<span class="badge on">●</span>`:`<span class="badge off">${s.requires_key?"key":"off"}</span>`;
    return `<label class="row ${s.enabled?"":"dim"}"><span>${s.label} ${badge}</span>
      <input type="checkbox" class="src" value="${s.name}" ${s.enabled?"checked":""} ${s.enabled?"":"disabled"}></label>`;}).join("");
  renderLegend();
}
function renderLegend(){
  buildClusterColors(lastData);
  const modes=[["cat",t("cm_cat")],["cluster",t("cm_cluster")],["sentiment",t("cm_sent")]];
  const ctrl=`<span class="cmode">${modes.map(([m,l])=>
    `<button data-cm="${m}" class="${colorMode===m?"on":""}">${l}</button>`).join("")}</span>`;
  let sw="";
  if(colorMode==="cat"){
    const cats=CATS.filter(c=>c.selectable!==false||lastData?.kws?.some(k=>k.cat===c.id));
    sw=cats.map(c=>`<span class="chip"><span class="dot" style="background:${c.color}"></span>${lang==="ko"?c.ko:c.en}</span>`).join("");
  }else if(colorMode==="cluster"){
    const cl=(lastData&&lastData.clusters)||[];
    sw=cl.length?cl.slice(0,8).map(c=>`<span class="chip"><span class="dot" style="background:${clusterColorMap[c.id]}"></span>${c.keywords.slice(0,2).join("·")}</span>`).join(""):`<span style="color:var(--muted)">${t("cm_cluster")}</span>`;
  }else{
    sw=`<span class="chip"><span class="dot" style="background:#fb7185"></span>${t("sent_neg")}</span>
        <span class="chip"><span class="dot" style="background:#9aa3b5"></span>${t("sent_neu")}</span>
        <span class="chip"><span class="dot" style="background:#34d399"></span>${t("sent_pos")}</span>`;
  }
  $("legend").innerHTML=ctrl+sw;
  $("legend").querySelectorAll(".cmode button").forEach(b=>b.addEventListener("click",()=>{
    colorMode=b.dataset.cm;localStorage.setItem("mt_colormode",colorMode);
    renderLegend();if(lastData)redraw();}));
}
const selected=cls=>[...document.querySelectorAll("."+cls+":checked")].map(c=>c.value);

//════════════════ 트렌드 요청 ════════════════
function trendParams(){
  const p=new URLSearchParams();
  selected("cat").forEach(v=>p.append("categories",v));
  regionIds().forEach(v=>p.append("regions",v));
  selected("src").forEach(v=>p.append("sources",v));
  p.set("hours",$("hours").value);p.set("min_freq",$("minFreq").value);p.set("max_kw",$("maxKw").value);
  p.set("per_feed",$("perFeed").value);
  return p;
}
async function run(){
  if(!selected("cat").length){setStatus(t("st_pickcat"));return;}
  $("run").disabled=true;$("netEmpty").style.display="none";setStatus(t("st_analyzing"),true);
  try{
    const data=await fetch(API+"/api/trends?"+trendParams()).then(r=>r.json());
    lastData=data;renderControls();updateKPIs(data);
    if(!data.kws||!data.kws.length){setStatus(t("st_nokw"));$("run").disabled=false;return;}
    redraw();
    const so=data.sentimentOverall||0;
    const sLbl=lang==="ko"?"감성":"sentiment";
    setStatus(t("st_done",{a:data.articleCount,k:data.kws.length,l:data.links.length,
      c:t("cache")[data.cache]||data.cache,kiwi:data.kiwi?"ON":"heuristic",
      t:new Date().toLocaleTimeString(lang==="ko"?"ko-KR":"en-US")})
      +` · ${sLbl} ${sentArrow(so)} ${so.toFixed(2)}`);
  }catch(e){setStatus("❌ "+e.message);}
  $("run").disabled=false;
}
async function ingestNow(){
  $("ingest").disabled=true;setStatus(t("st_ingesting"),true);
  try{
    const p=new URLSearchParams();selected("cat").forEach(v=>p.append("categories",v));
    regionIds().forEach(v=>p.append("regions",v));p.set("hours",$("hours").value);p.set("per_feed",$("perFeed").value);
    await fetch(API+"/api/ingest?"+p,{method:"POST"}).then(r=>r.json());
    await run();
  }catch(e){setStatus("❌ "+e.message);}
  $("ingest").disabled=false;
}

//════════════════ 키워드 검색 ════════════════
function renderChips(){
  $("kwChips").innerHTML=searchKw.map(k=>
    `<span class="kwchip" data-kw="${encodeURIComponent(k)}"><b>${k}</b><span class="x" data-x="${encodeURIComponent(k)}">×</span></span>`).join("");
  $("kwChips").querySelectorAll(".kwchip").forEach(el=>{
    el.addEventListener("click",ev=>{if(ev.target.dataset.x)return;doSearch(decodeURIComponent(el.dataset.kw));});});
  $("kwChips").querySelectorAll(".x").forEach(el=>el.addEventListener("click",ev=>{
    ev.stopPropagation();const k=decodeURIComponent(el.dataset.x);searchKw=searchKw.filter(x=>x!==k);renderChips();}));
}
async function doSearch(q){
  q=(q||"").trim();if(!q)return;
  if(!searchKw.includes(q)){searchKw.unshift(q);searchKw=searchKw.slice(0,8);renderChips();}
  setStatus(t("st_searching",{q}),true);
  const p=new URLSearchParams({q,hours:$("hours").value,count:$("perFeed").value});regionIds().forEach(v=>p.append("regions",v));
  try{
    const data=await fetch(API+"/api/search?"+p).then(r=>r.json());
    lastSearch=data;openResults(data);
    setStatus(t("st_search_done",{q,n:data.count}));
  }catch(e){setStatus("❌ "+e.message);}
}
function openResults(data){
  $("resTitle").textContent=t("res_title",{q:data.query});
  const arts=data.articles||[];
  $("resBody").innerHTML=arts.length?arts.map(a=>{
    const dt=new Date(a.published_at*1000).toLocaleString(lang==="ko"?"ko-KR":"en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
    const reg=(REGIONS.find(r=>r.id===a.region)||{});
    return `<a class="artitem" href="${a.url}" target="_blank" rel="noopener">
      <div class="t">${a.title}</div>
      <div class="m"><span>${a.publisher||a.source}</span><span>${lang==="ko"?reg.ko:reg.en||a.region}</span><span>${dt}</span></div></a>`;
  }).join(""):`<div style="padding:24px;text-align:center;color:var(--muted)">${t("no_results")}</div>`;
  $("results").classList.add("open");
}
async function mergeSearch(){
  if(!lastSearch)return;
  const q=lastSearch.query;setStatus(t("st_searching",{q}),true);
  const p=new URLSearchParams({q,hours:$("hours").value,count:$("perFeed").value,store:"true"});regionIds().forEach(v=>p.append("regions",v));
  try{
    const data=await fetch(API+"/api/search?"+p).then(r=>r.json());
    setStatus(t("st_merged",{q,n:data.count}));
    $("results").classList.remove("open");
    await run();
  }catch(e){setStatus("❌ "+e.message);}
}

//════════════════ 시각화 공통 ════════════════
function redraw(){buildClusterColors(lastData);const v=document.querySelector(".tab.active").dataset.v;
  if(v==="net")drawNetwork(lastData);if(v==="cloud")drawCloud(lastData);
  if(v==="bubble")drawBubble(lastData);if(v==="tree")drawTreemap(lastData);
  if(v==="rising")drawRising(lastData);}
const sentArrow=s=>s>0.05?'<span style="color:var(--ok)">▲</span>':s<-0.05?'<span style="color:var(--err)">▼</span>':'<span style="color:var(--muted)">–</span>';
const sentWord=s=>s>0.05?t("sent_pos"):s<-0.05?t("sent_neg"):t("sent_neu");

function drawRising(data){
  const wrap=$("risingWrap");const items=(data&&data.rising)||[];
  if(!items.length){wrap.innerHTML=`<div class="empty" style="position:static;height:100%">${t("rising_empty")}</div>`;return;}
  const mx=Math.max(...items.map(r=>r.score),1);
  wrap.innerHTML=items.map((r,i)=>`<div class="rise">
    <div class="rk">${i+1}</div>
    <div class="nm"><span class="dot" style="background:${colorOf(r.cat)};border-radius:50%"></span>${r.id}
      ${r.isNew?`<span class="new">${t("rising_new")}</span>`:""}</div>
    <div class="track"><i style="width:${Math.round(100*r.score/mx)}%;background:${colorOf(r.cat)}"></i></div>
    <div class="met"><span class="sc">×${r.score}</span> · ${r.prev}→${r.recent} (+${r.growth})</div>
  </div>`).join("");
}

function ensureDefs(svg){
  if(svg.select("defs").size())return;
  const d=svg.append("defs");
  const f=d.append("filter").attr("id","glow").attr("x","-60%").attr("y","-60%").attr("width","220%").attr("height","220%");
  f.append("feGaussianBlur").attr("stdDeviation","3.2").attr("result","b");
  const m=f.append("feMerge");m.append("feMergeNode").attr("in","b");m.append("feMergeNode").attr("in","SourceGraphic");
}

//──────────── 네트워크(개선) ────────────
let netSim=null;
function drawNetwork(data){
  const svg=d3.select("#netSvg");svg.selectAll("*").remove();ensureDefs(svg);
  const el=$("netSvg"),W=el.clientWidth,H=el.clientHeight;
  if(netSim)netSim.stop();
  const g=svg.append("g");
  svg.call(d3.zoom().scaleExtent([.3,4]).on("zoom",ev=>g.attr("transform",ev.transform)));
  const nodes=data.kws.map(d=>({...d})),links=data.links.map(d=>({...d}));
  const mx=d3.max(nodes,d=>d.freq)||1,rOf=d=>6+20*Math.sqrt(d.freq/mx);
  netSim=d3.forceSimulation(nodes)
    .force("link",d3.forceLink(links).id(d=>d.id).distance(d=>64-Math.min(40,d.value*4)).strength(.45))
    .force("charge",d3.forceManyBody().strength(-200))
    .force("center",d3.forceCenter(W/2,H/2))
    .force("collide",d3.forceCollide(d=>rOf(d)+12));
  const nById=Object.fromEntries(nodes.map(n=>[n.id,n]));
  const link=g.append("g").selectAll("path").data(links).join("path")
    .attr("fill","none").attr("stroke-linecap","round")
    .attr("stroke",d=>nodeColor(nById[d.source.id||d.source]||{}))
    .attr("stroke-opacity",.22).attr("stroke-width",d=>1+Math.sqrt(d.value)*1.1);
  const node=g.append("g").selectAll("g").data(nodes).join("g").style("cursor","pointer").call(drag(netSim));
  node.append("circle").attr("r",rOf).attr("fill",d=>nodeColor(d))
    .attr("stroke","#0b0e16").attr("stroke-width",1.5).attr("filter","url(#glow)").attr("fill-opacity",.92);
  node.append("text").attr("text-anchor","middle").attr("dy",d=>-rOf(d)-5)
    .attr("fill","#eef1f8").attr("font-size",d=>d.freq>=mx*.5?13:11).attr("font-weight",700)
    .attr("stroke","#0b0e16").attr("stroke-width",3).attr("paint-order","stroke")
    .style("display",d=>d.freq>=mx*.16?null:"none").text(d=>d.id);
  node.on("mouseover",(e,d)=>{
    const cats=Object.entries(d.catScore).map(([k,v])=>`${catLabel(k)} ${v}`).join(" · ");
    const arts=(d.articles||[]).map(a=>`· ${a.title}${a.publisher?` <span style="color:var(--muted)">(${a.publisher})</span>`:""}`).join("<br>");
    const sLbl=lang==="ko"?"감성":"sentiment";
    showTip(`<b>${d.id}</b> — ${d.freq} · ${sLbl} ${sentArrow(d.sent||0)} ${sentWord(d.sent||0)}<br><span style="color:var(--muted)">${cats}</span><br><br>${arts}`,e);
    const adj=new Set();links.forEach(l=>{const s=l.source.id,tt=l.target.id;if(s===d.id)adj.add(tt);if(tt===d.id)adj.add(s);});
    link.attr("stroke-opacity",l=>l.source.id===d.id||l.target.id===d.id?.9:.04);
    node.style("opacity",n=>n.id===d.id||adj.has(n.id)?1:.18);})
   .on("mousemove",moveTip)
   .on("mouseout",()=>{hideTip();link.attr("stroke-opacity",.22);node.style("opacity",1);})
   .on("click",(e,d)=>{if(!e.defaultPrevented)openKeyword(d.id);});
  netSim.on("tick",()=>{
    link.attr("d",d=>{const x1=d.source.x,y1=d.source.y,x2=d.target.x,y2=d.target.y;
      const dr=Math.hypot(x2-x1,y2-y1)*1.6;return `M${x1},${y1}A${dr},${dr} 0 0,1 ${x2},${y2}`;});
    node.attr("transform",d=>`translate(${d.x},${d.y})`);});
  const top=data.kws.slice(0,10),tm=top[0]?.freq||1;
  $("topList").innerHTML=top.map(d=>
    `<div class="bar"><div class="bx" style="width:${10+70*d.freq/tm}px;background:${colorOf(d.cat)}"></div>
     <div class="bn">${d.id}</div><div class="bc">${d.freq}</div></div>`).join("");
}
function drag(sim){return d3.drag()
  .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
  .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
  .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;});}

//──────────── 워드클라우드(개선) ────────────
function drawCloud(data){
  const svg=d3.select("#cloudSvg");svg.selectAll("*").remove();
  const el=$("cloudSvg"),W=el.clientWidth,H=el.clientHeight;
  // 부드러운 구름 배경
  const defs=svg.append("defs");
  const rg=defs.append("radialGradient").attr("id","cloudbg");
  rg.append("stop").attr("offset","0%").attr("stop-color","#1b2236").attr("stop-opacity",".9");
  rg.append("stop").attr("offset","100%").attr("stop-color","#0b0e16").attr("stop-opacity","0");
  const blur=defs.append("filter").attr("id","soft");
  blur.append("feGaussianBlur").attr("stdDeviation","1.1");
  svg.append("ellipse").attr("cx",W/2).attr("cy",H/2).attr("rx",W*.42).attr("ry",H*.4).attr("fill","url(#cloudbg)");
  const mx=d3.max(data.kws,d=>d.freq)||1,mn=d3.min(data.kws,d=>d.freq)||1;
  const sc=d3.scaleSqrt().domain([mn,mx]).range([14,Math.min(96,W/9)]);
  const op=d3.scaleLinear().domain([mn,mx]).range([.6,1]);
  const words=data.kws.map(d=>({text:d.id,size:sc(d.freq),cat:d.cat,cluster:d.cluster,sent:d.sent,freq:d.freq,op:op(d.freq)}));
  const angles=[0,0,0,0,90,-30,30];
  d3.layout.cloud().size([W,H]).words(words).padding(2.4).font("Apple SD Gothic Neo")
    .rotate(()=>angles[Math.floor(Math.random()*angles.length)]).fontSize(d=>d.size)
    .on("end",ws=>{
      const g=svg.append("g").attr("transform",`translate(${W/2},${H/2})`);
      g.selectAll("text").data(ws).join("text")
        .style("font-family","Apple SD Gothic Neo,sans-serif").style("font-weight",800).style("cursor","pointer")
        .style("fill",d=>nodeColor(d)).style("fill-opacity",d=>d.op).attr("filter","url(#soft)")
        .attr("text-anchor","middle").attr("font-size",d=>d.size)
        .attr("transform",d=>`translate(${d.x},${d.y})rotate(${d.rotate})`).text(d=>d.text)
        .style("transition","fill-opacity .15s")
        .on("mouseover",function(e,d){d3.select(this).style("fill-opacity",1).attr("filter","url(#glow2)");
          showTip(`<b>${d.text}</b> — ${d.freq} · ${catLabel(d.cat)}`,e);})
        .on("mousemove",moveTip)
        .on("mouseout",function(e,d){d3.select(this).style("fill-opacity",d.op).attr("filter","url(#soft)");hideTip();});
      // 글로우 필터(호버용)
      const f=defs.append("filter").attr("id","glow2").attr("x","-60%").attr("y","-60%").attr("width","220%").attr("height","220%");
      f.append("feGaussianBlur").attr("stdDeviation","2.6").attr("result","b");
      const m=f.append("feMerge");m.append("feMergeNode").attr("in","b");m.append("feMergeNode").attr("in","SourceGraphic");
    }).start();
}

//──────────── 분야별 버블 ────────────
function drawBubble(data){
  const svg=d3.select("#bubbleSvg");svg.selectAll("*").remove();ensureDefs(svg);
  const el=$("bubbleSvg"),W=el.clientWidth,H=el.clientHeight;
  const active=CATS.filter(c=>data.kws.some(k=>k.cat===c.id));
  if(!active.length)return;
  const colW=W/active.length,xOf={};active.forEach((c,i)=>xOf[c.id]=colW*(i+.5));
  svg.append("g").selectAll("text").data(active).join("text")
    .attr("x",c=>xOf[c.id]).attr("y",26).attr("text-anchor","middle")
    .attr("fill",c=>c.color).attr("font-weight",800).attr("font-size",15).text(c=>lang==="ko"?c.ko:c.en);
  const mx=d3.max(data.kws,d=>d.freq)||1,rOf=d=>6+30*Math.sqrt(d.freq/mx);
  const nodes=data.kws.map(d=>({...d}));
  const sim=d3.forceSimulation(nodes).force("x",d3.forceX(d=>xOf[d.cat]||W/2).strength(.5))
    .force("y",d3.forceY(H/2+15).strength(.06)).force("collide",d3.forceCollide(d=>rOf(d)+1.5)).stop();
  for(let i=0;i<260;i++)sim.tick();
  const g=svg.append("g").selectAll("g").data(nodes).join("g").style("cursor","pointer");
  g.append("circle").attr("cx",d=>d.x).attr("cy",d=>d.y).attr("r",rOf)
    .attr("fill",d=>nodeColor(d)).attr("fill-opacity",.85).attr("stroke","#0b0e16").attr("filter","url(#glow)");
  g.append("text").attr("x",d=>d.x).attr("y",d=>d.y).attr("dy",".32em").attr("text-anchor","middle")
    .attr("fill","#0b0d13").attr("font-weight",800).attr("font-size",d=>Math.min(13,rOf(d)*.7))
    .style("display",d=>rOf(d)>15?null:"none").text(d=>d.id);
  g.on("mouseover",(e,d)=>showTip(`<b>${d.id}</b> — ${d.freq} · ${catLabel(d.cat)}`,e))
   .on("mousemove",moveTip).on("mouseout",hideTip);
}

//──────────── 트리맵 ────────────
function drawTreemap(data){
  const svg=d3.select("#treeSvg");svg.selectAll("*").remove();
  const el=$("treeSvg"),W=el.clientWidth,H=el.clientHeight;
  if(!data.kws.length)return;
  const byCat=d3.group(data.kws,d=>d.cat);
  const root={name:"root",children:[...byCat].map(([cat,kws])=>
    ({name:cat,cat,children:kws.map(k=>({name:k.id,value:k.freq,d:k}))}))};
  const h=d3.hierarchy(root).sum(d=>d.value||0).sort((a,b)=>b.value-a.value);
  d3.treemap().size([W,H]).paddingInner(2).paddingTop(20).paddingOuter(2).round(true)(h);
  const g=svg.append("g");
  // 분야 배경 라벨
  g.append("g").selectAll("text").data(h.children||[]).join("text")
    .attr("x",d=>d.x0+5).attr("y",d=>d.y0+14).attr("fill",d=>colorOf(d.data.cat))
    .attr("font-weight",800).attr("font-size",12).text(d=>catLabel(d.data.cat));
  const cell=g.selectAll("g.cell").data(h.leaves()).join("g").attr("class","cell")
    .attr("transform",d=>`translate(${d.x0},${d.y0})`).style("cursor","pointer");
  cell.append("rect").attr("width",d=>d.x1-d.x0).attr("height",d=>d.y1-d.y0)
    .attr("fill",d=>nodeColor(d.data.d)).attr("fill-opacity",.86).attr("stroke","#0b0e16").attr("rx",3);
  cell.append("text").attr("x",5).attr("y",15).attr("fill","#0b0d13").attr("font-weight",700)
    .attr("font-size",11).text(d=>d.data.name)
    .each(function(d){if(d.x1-d.x0<30||d.y1-d.y0<18)d3.select(this).style("display","none");});
  cell.on("mouseover",(e,d)=>showTip(`<b>${d.data.name}</b> — ${d.data.value} · ${catLabel(d.data.d.cat)}`,e))
    .on("mousemove",moveTip).on("mouseout",hideTip)
    .on("click",(e,d)=>{if(window.openKeyword)openKeyword(d.data.name);});
}

//──────────── 키워드 상세 드로어 ────────────
async function openKeyword(kw){
  const node=(lastData&&lastData.kws||[]).find(k=>k.id===kw);if(!node)return;
  const rel=[];(lastData.links||[]).forEach(l=>{const s=l.source.id||l.source,tt=l.target.id||l.target;
    if(s===kw)rel.push([tt,l.value]);else if(tt===kw)rel.push([s,l.value]);});
  rel.sort((a,b)=>b[1]-a[1]);
  const arts=node.articles||[];
  $("kwTitle").textContent=kw;
  $("kwBody").innerHTML=`
    <div class="kwstat">
      <div><div class="kl">${t("d_freq")}</div><div class="kvv">${node.freq}</div></div>
      <div><div class="kl">${t("d_sentiment")}</div><div class="kvv">${sentArrow(node.sent||0)} ${sentWord(node.sent||0)}</div></div>
      <div><div class="kl">${catLabel(node.cat)}</div><div class="kvv" style="color:${colorOf(node.cat)}">●</div></div>
    </div>
    <div class="kwsec"><div class="kl">${t("d_trend")}</div><div id="kwSpark" style="color:var(--muted);font-size:12px">…</div></div>
    <div class="kwsec"><div class="kl">${t("d_related")}</div><div class="relwrap">${rel.slice(0,14).map(([k,v])=>`<span class="kwchip rel" data-rk="${encodeURIComponent(k)}">${k}<b>${v}</b></span>`).join("")||"—"}</div></div>
    <div class="kwsec"><div class="kl">${t("d_articles")}</div>${arts.map(a=>`<a class="artitem" href="${a.url}" target="_blank" rel="noopener"><div class="t">${a.title}</div><div class="m"><span>${a.publisher||""}</span><span>${catLabel(a.category)}</span></div></a>`).join("")||"—"}</div>`;
  $("kwDrawer").classList.add("open");
  $("kwBody").querySelectorAll(".rel").forEach(el=>el.addEventListener("click",()=>openKeyword(decodeURIComponent(el.dataset.rk))));
  drawSpark(kw,node);
}
window.openKeyword=openKeyword;
async function drawSpark(kw,node){
  try{
    const p=new URLSearchParams({keyword:kw,hours:$("hours").value,buckets:"24"});
    selected("cat").forEach(v=>p.append("categories",v));regionIds().forEach(v=>p.append("regions",v));
    const tl=await fetch(API+"/api/timeline?"+p).then(r=>r.json());
    const vals=tl.series[kw]||[];const wrap=$("kwSpark");
    if(!vals.length||vals.every(v=>!v)){wrap.textContent="—";return;}
    const W=wrap.clientWidth||320,H=64,mx=Math.max(...vals,1);
    const x=i=>vals.length>1?i/(vals.length-1)*W:0,y=v=>H-4-(v/mx)*(H-12);
    const line=vals.map((v,i)=>`${i?"L":"M"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join("");
    const area=`M0,${H} `+vals.map((v,i)=>`L${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ")+` L${W},${H} Z`;
    const col=nodeColor(node);
    wrap.innerHTML=`<svg width="100%" height="${H}" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      <path d="${area}" fill="${col}" fill-opacity=".18"/>
      <path d="${line}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round"/></svg>`;
  }catch(e){$("kwSpark").textContent="—";}
}

  const a=document.createElement("a");a.href=API+"/api/export?"+p;a.download="mytrend_keywords.csv";

document.querySelectorAll(".langtog button").forEach(b=>b.addEventListener("click",()=>{

document.querySelectorAll(".tab").forEach(tb=>tb.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".pane").forEach(x=>x.classList.remove("active"));
  tb.classList.add("active");document.querySelector(`.pane[data-v="${tb.dataset.v}"]`).classList.add("active");
  if(lastData)redraw();}));

applyTheme();
init();
