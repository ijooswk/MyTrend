<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTrend · 뉴스 트렌드 맵</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3-cloud/1.2.7/d3.layout.cloud.min.js"></script>
<style>
  :root{--bg:#0b0e16;--panel:#141824;--panel2:#1c2130;--line:#2a3142;--txt:#e8eaf0;
    --muted:#94a0b8;--accent:#5b8cff;--ok:#34d399;--err:#fb7185;--search:#e879f9;
    --stage:#0b0e16;--stageInk:#eef1f8;--stageStroke:#0b0e16;--card:#171c28;}
  :root[data-theme="light"]{--bg:#eef1f7;--panel:#ffffff;--panel2:#f1f4fa;--line:#dde3ee;
    --txt:#1a2030;--muted:#5b6678;--accent:#3b6ef5;--card:#ffffff;
    --stage:#f3f6fb;--stageInk:#1a2030;--stageStroke:#ffffff;}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    background:var(--bg);color:var(--txt);font-size:14px;transition:background .2s,color .2s}
  header{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--line);
    background:var(--panel)}
  header h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.3px}
  header .sub{color:var(--muted);font-size:12px}
  header .right{margin-left:auto;display:flex;align-items:center;gap:14px}
  .langtog{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .langtog button{background:transparent;color:var(--muted);border:none;padding:5px 10px;font-size:12px;
    font-weight:700;cursor:pointer}
  .langtog button.on{background:var(--accent);color:#fff}
  .srcstat{font-size:12px;color:var(--muted)}
  .regionbar{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--line)}
  .seg{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:3px}
  .seg button{background:transparent;border:none;color:var(--muted);padding:7px 18px;font-size:13px;
    font-weight:700;cursor:pointer;border-radius:7px;display:flex;align-items:center;gap:6px}
  .seg button.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(91,140,255,.4)}
  .regionbar .hint{color:var(--muted);font-size:12px}
  .wrap{display:flex;min-height:calc(100vh - 104px)}
  aside{width:296px;flex-shrink:0;border-right:1px solid var(--line);background:var(--panel);
    padding:16px;overflow-y:auto;max-height:calc(100vh - 104px);position:sticky;top:0}
  main{flex:1;display:flex;flex-direction:column;min-width:0}
  .sec{margin-bottom:18px}
  .sec h3{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin:0 0 8px;font-weight:800}
  label.row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0;cursor:pointer}
  label.row span{font-size:13px}label.row.dim{opacity:.45}
  input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent)}
  .chip{display:inline-flex;align-items:center;gap:6px}.dot{width:9px;height:9px;border-radius:50%}
  .badge{font-size:10px;padding:1px 6px;border-radius:10px;background:var(--panel2);color:var(--muted)}
  .badge.on{background:rgba(52,211,153,.15);color:var(--ok)}.badge.off{background:rgba(251,113,133,.12);color:var(--err)}
  input[type=range]{width:100%;accent-color:var(--accent)}.val{color:var(--accent);font-weight:800}
  .field{margin-bottom:10px}.field>div:first-child{font-size:12px;color:var(--muted);margin-bottom:4px}
  button.run{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px;
    font-size:14px;font-weight:800;cursor:pointer;margin-top:4px}button.run:hover{filter:brightness(1.08)}
  button.run:disabled{opacity:.55;cursor:not-allowed}
  button.ghost{width:100%;background:var(--panel2);color:var(--txt);border:1px solid var(--line);
    border-radius:9px;padding:9px;font-size:13px;cursor:pointer;margin-top:8px}
  button.ghost.on{border-color:var(--ok);color:var(--ok);box-shadow:0 0 0 1px var(--ok) inset}
  .searchbox{display:flex;gap:6px}
  .searchbox input{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    padding:8px 10px;color:var(--txt);font-size:13px;font-family:inherit}
  .searchbox button{background:var(--search);border:none;color:#1a0b1f;font-weight:800;border-radius:8px;
    padding:0 14px;cursor:pointer;font-size:13px}
  .kwchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .kwchip{display:inline-flex;align-items:center;gap:6px;background:rgba(232,121,249,.13);color:var(--search);
    border:1px solid rgba(232,121,249,.35);border-radius:14px;padding:3px 6px 3px 10px;font-size:12px;cursor:pointer}
  .kwchip b{font-weight:700}.kwchip .x{cursor:pointer;opacity:.7;font-weight:800}.kwchip .x:hover{opacity:1}
  .tabs{display:flex;gap:4px;padding:10px 16px 0;border-bottom:1px solid var(--line)}
  .tab{padding:9px 16px;font-size:13px;color:var(--muted);cursor:pointer;border-radius:8px 8px 0 0;
    border:1px solid transparent;border-bottom:none;font-weight:700}
  .tab.active{color:var(--txt);background:var(--panel);border-color:var(--line)}
  .legend{display:flex;align-items:center;gap:14px;flex-wrap:wrap;padding:8px 16px;font-size:12px;border-bottom:1px solid var(--line)}
  .cmode{display:inline-flex;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:2px;margin-right:4px}
  .cmode button{background:transparent;border:none;color:var(--muted);padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer;border-radius:6px}
  .cmode button.on{background:var(--accent);color:#fff}
  .ailabelbtn{background:linear-gradient(90deg,#5b8cff,#a855f7);color:#fff;border:none;border-radius:7px;
    padding:4px 10px;font-size:11px;font-weight:800;cursor:pointer;margin-right:6px}
  .insights{display:flex;gap:8px;flex-wrap:wrap;padding:8px 16px;border-bottom:1px solid var(--line);background:var(--panel)}
  .insights:empty{display:none}
  .ins{background:var(--card);border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:12px;white-space:nowrap}
  .view{flex:1;position:relative;overflow:hidden;background:var(--stage)}
  /* 헤더 KPI 카드 */
  .kpis{display:flex;gap:10px;padding:10px 20px;border-bottom:1px solid var(--line);background:var(--panel);flex-wrap:wrap}
  .kpi{display:flex;flex-direction:column;gap:2px;min-width:96px;padding:8px 12px;background:var(--card);
    border:1px solid var(--line);border-radius:10px}
  .kpi .kv{font-size:20px;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
  .kpi .kl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .kpi.sent .kv{display:flex;align-items:center;gap:6px}
  .gauge{width:54px;height:6px;border-radius:4px;background:linear-gradient(90deg,var(--err),#9aa3b5,var(--ok));position:relative}
  .gauge i{position:absolute;top:-3px;width:3px;height:12px;background:var(--txt);border-radius:2px;transform:translateX(-50%)}
  .iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);border-radius:8px;
    width:34px;height:30px;cursor:pointer;font-size:15px}
  .pane{position:absolute;inset:0;display:none}.pane.active{display:block}
  #netSvg,#bubbleSvg,#cloudSvg,#treeSvg,#heatSvg,#radarSvg{width:100%;height:100%;display:block}
  /* 히스토리 뷰 */
  #histWrap{position:absolute;inset:0;display:flex;flex-direction:column}
  .histbar{display:flex;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line);flex-wrap:wrap}
  .histbar input{flex:1;min-width:140px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 10px;color:var(--txt);font-size:13px}
  .histbar button#histBtn{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 14px;font-weight:700;cursor:pointer}
  .histbar select{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px;color:var(--txt);font-size:12px}
  .histbody{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:16px}
  #histLine{width:100%;height:200px;flex-shrink:0}
  #histInfo{display:flex;gap:10px;flex-wrap:wrap}
  .hchip{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 12px;font-size:12px}
  .hchip b{color:var(--accent)}
  .radarai{position:absolute;right:14px;bottom:14px;max-width:320px;max-height:42%;overflow-y:auto;
    background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px 12px 12px;font-size:12px;
    line-height:1.6;color:var(--txt);box-shadow:0 4px 16px rgba(0,0,0,.2)}.radarai:empty{display:none}
  .aiclose{position:absolute;top:6px;right:8px;background:none;border:none;color:var(--muted);font-size:16px;
    line-height:1;cursor:pointer;font-weight:800}.aiclose:hover{color:var(--txt)}
  .status{padding:8px 16px;font-size:12px;color:var(--muted);border-top:1px solid var(--line);
    display:flex;align-items:center;gap:10px;min-height:34px;background:var(--panel)}
  .empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    color:var(--muted);gap:10px;text-align:center;padding:20px}.empty b{color:var(--txt);font-size:15px}
  .spin{width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;
    animation:sp .7s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
  .tooltip{position:fixed;pointer-events:none;background:var(--panel);color:var(--txt);border:1px solid var(--line);
    border-radius:8px;padding:8px 11px;font-size:12px;z-index:60;display:none;max-width:320px;line-height:1.5;
    box-shadow:0 6px 20px rgba(0,0,0,.25)}.tooltip b{color:var(--accent)}
  .netctrl{position:absolute;left:14px;top:14px;z-index:5}
  .barpanel{position:absolute;right:14px;top:14px;width:220px;background:var(--card);color:var(--txt);
    border:1px solid var(--line);border-radius:12px;padding:12px;box-shadow:0 4px 16px rgba(0,0,0,.18)}
  .barpanel h4{margin:0 0 8px;font-size:12px;color:var(--muted);font-weight:800;text-transform:uppercase}
  .bar{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px}
  .bar .bx{height:14px;border-radius:3px;min-width:3px}.bar .bn{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .bc{color:var(--muted);font-variant-numeric:tabular-nums}
  /* 검색 결과 슬라이드 패널 */
  .results{position:fixed;top:0;right:0;height:100vh;width:380px;background:var(--panel);border-left:1px solid var(--line);
    transform:translateX(100%);transition:transform .25s ease;z-index:70;display:flex;flex-direction:column;box-shadow:-12px 0 30px rgba(0,0,0,.4)}
  .results.open{transform:translateX(0)}
  .results header{border-bottom:1px solid var(--line);padding:14px 16px;backdrop-filter:none;background:transparent}
  .results h3{margin:0;font-size:14px;font-weight:800}
  .results .close{margin-left:auto;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
  .results .body{flex:1;overflow-y:auto;padding:8px 12px}
  .artitem{display:block;padding:10px 8px;border-bottom:1px solid var(--line);text-decoration:none;color:var(--txt)}
  .artitem:hover{background:var(--panel2)}.artitem .t{font-size:13px;font-weight:600;line-height:1.4}
  .artitem .m{font-size:11px;color:var(--muted);margin-top:3px;display:flex;gap:8px}
  .results .foot{padding:12px 16px;border-top:1px solid var(--line)}
  .results .foot button{width:100%;background:var(--search);color:#1a0b1f;border:none;border-radius:9px;
    padding:10px;font-weight:800;cursor:pointer}
  /* 급상승 리스트 */
  #risingWrap{position:absolute;inset:0;overflow-y:auto;padding:16px 20px}
  .rise{display:flex;align-items:center;gap:12px;padding:10px 12px;margin:6px 0;border:1px solid var(--line);
    border-radius:10px;background:var(--panel2)}
  .rise .rk{width:26px;text-align:center;font-weight:800;color:var(--muted);font-size:13px}
  .rise .nm{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;min-width:120px}
  .rise .nm .dot{width:10px;height:10px}
  .rise .new{font-size:10px;font-weight:800;background:var(--search);color:#1a0b1f;border-radius:6px;padding:1px 6px}
  .rise .track{flex:1;height:8px;background:#0b0e16;border-radius:5px;overflow:hidden}
  .rise .track i{display:block;height:100%;border-radius:5px}
  .rise .met{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;min-width:120px;text-align:right}
  .rise .sc{font-weight:800;color:var(--ok)}
  /* 키워드 상세 드로어 */
  #kwDrawer .body{padding:14px 16px}
  .kwstat{display:flex;gap:10px;margin-bottom:14px}
  .kwstat>div{flex:1;background:var(--card);border:1px solid var(--line);border-radius:10px;padding:8px 10px}
  .kwstat .kl{font-size:11px;color:var(--muted)}
  .kwstat .kvv{font-size:16px;font-weight:800;margin-top:2px}
  .kwsec{margin-bottom:16px}
  .kwsec>.kl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;font-weight:700}
  .relwrap{display:flex;flex-wrap:wrap;gap:6px}
  .kwchip.rel{background:var(--panel2);color:var(--txt);border:1px solid var(--line)}
  .kwchip.rel b{color:var(--accent);margin-left:4px}
  /* AI 드로어 */
  .aiout{margin-top:10px;font-size:13px;line-height:1.65;background:var(--card);border:1px solid var(--line);
    border-radius:10px;padding:12px;min-height:8px}.aiout:empty{display:none}
  /* AI 출력 마크다운 스타일(드로어/레이더/히스토리 공통) */
  .aiout p,.radarai p{margin:6px 0}
  .aiout h4,.radarai h4{margin:10px 0 4px;font-size:13px;font-weight:800;color:var(--accent)}
  .aiout ul,.aiout ol,.radarai ul,.radarai ol{margin:6px 0 6px 2px;padding-left:18px}
  .aiout li,.radarai li{margin:3px 0}
  .aiout strong,.radarai strong{color:var(--txt);font-weight:800}
  .aiout code,.radarai code{background:var(--panel2);padding:1px 5px;border-radius:4px;font-size:12px}
  .aiout p:first-child,.radarai p:first-child,.aiout h4:first-child,.radarai h4:first-child{margin-top:0}
  .aifoot{font-size:11px;color:var(--muted);padding:4px 2px}
  #aiBtn{background:linear-gradient(90deg,#5b8cff,#a855f7);color:#fff;border:none}
  #aiModelSel{width:100%;margin-top:6px;background:var(--panel2);color:var(--txt);border:1px solid var(--line);
    border-radius:8px;padding:7px 9px;font-size:12px;font-family:inherit}
</style>
</head>
<body>
<header>
  <h1>📡 MyTrend</h1>
  <span class="sub" data-i18n="subtitle"></span>
  <div class="right">
    <span class="srcstat" id="hdrStat"></span>
    <button class="iconbtn" id="aiBtn" title="AI" style="width:auto;padding:0 10px;font-weight:800">✨ AI</button>
    <button class="iconbtn" id="imgBtn" title="copy/save image">📷</button>
    <button class="iconbtn" id="themeBtn" title="theme">🌙</button>
    <div class="langtog">
      <button data-lang="ko">KO</button><button data-lang="en">EN</button>
    </div>
  </div>
</header>
<div class="kpis" id="kpis">
  <div class="kpi"><div class="kv" id="kpiArticles">–</div><div class="kl" data-i18n="kpi_articles"></div></div>
  <div class="kpi"><div class="kv" id="kpiKeywords">–</div><div class="kl" data-i18n="kpi_keywords"></div></div>
  <div class="kpi"><div class="kv" id="kpiClusters">–</div><div class="kl" data-i18n="kpi_clusters"></div></div>
  <div class="kpi"><div class="kv" id="kpiSources">–</div><div class="kl" data-i18n="kpi_sources"></div></div>
  <div class="kpi sent"><div class="kv" id="kpiSent"><span id="kpiSentTxt">–</span><span class="gauge"><i id="kpiSentNeedle" style="left:50%"></i></span></div><div class="kl" data-i18n="kpi_sentiment"></div></div>
</div>

<div class="regionbar">
  <span class="hint" data-i18n="region_label"></span>
  <div class="seg" id="regionSeg">
    <button data-region="KR"   data-i18n="region_kr"></button>
    <button data-region="US"   data-i18n="region_global"></button>
    <button data-region="ALL"  class="on" data-i18n="region_all"></button>
  </div>
</div>

<div class="wrap">
  <aside>
    <div class="sec"><h3 data-i18n="h_search"></h3>
      <div class="searchbox">
        <input id="kwInput" data-i18n-ph="search_ph">
        <button id="kwBtn" data-i18n="btn_search"></button>
      </div>
      <div class="kwchips" id="kwChips"></div>
    </div>
    <div class="sec"><h3 data-i18n="h_cats"></h3><div id="cats"></div></div>
    <div class="sec"><h3 data-i18n="h_sources"></h3><div id="sources"></div></div>
    <div class="sec"><h3 data-i18n="h_settings"></h3>
      <div class="field"><div><span data-i18n="s_hours"></span> <span class="val" id="hoursVal">24</span><span data-i18n="unit_h"></span></div>
        <input type="range" id="hours" min="3" max="72" value="24"></div>
      <div class="field"><div><span data-i18n="s_minfreq"></span> <span class="val" id="minFreqVal">2</span></div>
        <input type="range" id="minFreq" min="1" max="8" value="2"></div>
      <div class="field"><div><span data-i18n="s_maxkw"></span> <span class="val" id="maxKwVal">80</span></div>
        <input type="range" id="maxKw" min="20" max="200" step="10" value="80"></div>
      <div class="field"><div><span data-i18n="s_count"></span> <span class="val" id="perFeedVal">50</span></div>
        <input type="range" id="perFeed" min="10" max="100" step="5" value="50"></div>
      <div class="field"><div><span data-i18n="s_assoc"></span> <span class="val" id="assocVal">0.2</span></div>
        <input type="range" id="assoc" min="0.1" max="0.7" step="0.05" value="0.2"></div>
    </div>
    <button class="run" id="run" data-i18n="btn_generate"></button>
    <button class="ghost" id="ingest" data-i18n="btn_ingest"></button>
    <button class="ghost" id="live" data-i18n="btn_live"></button>
    <button class="ghost" id="export" data-i18n="btn_export"></button>
  </aside>

  <main>
    <div class="tabs">
      <div class="tab active" data-v="net" data-i18n="tab_net"></div>
      <div class="tab" data-v="cloud" data-i18n="tab_cloud"></div>
      <div class="tab" data-v="bubble" data-i18n="tab_bubble"></div>
      <div class="tab" data-v="tree" data-i18n="tab_tree"></div>
      <div class="tab" data-v="heat" data-i18n="tab_heat"></div>
      <div class="tab" data-v="radar" data-i18n="tab_radar"></div>
      <div class="tab" data-v="history" data-i18n="tab_history"></div>
      <div class="tab" data-v="rising" data-i18n="tab_rising"></div>
    </div>
    <div class="legend" id="legend"></div>
    <div class="insights" id="insights"></div>
    <div class="view">
      <div class="pane active" data-v="net">
        <div class="netctrl"><span class="cmode" id="assocMode">
          <button data-am="cooccur" class="on" data-i18n="am_cooccur"></button>
          <button data-am="temporal" data-i18n="am_temporal"></button></span></div>
        <svg id="netSvg"></svg>
        <div class="barpanel"><h4 data-i18n="top_kw"></h4><div id="topList"></div></div>
        <div class="empty" id="netEmpty"><b data-i18n="empty_title"></b><span data-i18n="empty_desc"></span></div>
      </div>
      <div class="pane" data-v="cloud"><svg id="cloudSvg"></svg></div>
      <div class="pane" data-v="bubble"><svg id="bubbleSvg"></svg></div>
      <div class="pane" data-v="tree"><svg id="treeSvg"></svg></div>
      <div class="pane" data-v="heat">
        <div class="netctrl"><span class="cmode" id="heatMetricCtrl">
          <button data-hm="npmi" class="on" data-i18n="am_cooccur"></button>
          <button data-hm="temporal" data-i18n="am_temporal"></button></span></div>
        <svg id="heatSvg"></svg></div>
      <div class="pane" data-v="radar">
        <div class="netctrl"><button class="ailabelbtn" id="radarAiBtn" data-i18n="ai_radar_btn"></button></div>
        <svg id="radarSvg"></svg>
        <div id="radarAiOut" class="radarai"></div></div>
      <div class="pane" data-v="history"><div id="histWrap">
        <div class="histbar">
          <input id="histInput" data-i18n-ph="hist_ph">
          <button id="histBtn" data-i18n="hist_btn"></button>
          <span class="cmode" id="histInterval">
            <button data-iv="day" class="on" data-i18n="iv_day"></button>

const t=(k,vars={})=>{let s=STR[lang][k]??k;for(const v in vars)s=s.replaceAll("{"+v+"}",vars[v]);return s;};

  document.documentElement.lang=lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>el.textContent=t(el.dataset.i18n));
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>el.placeholder=t(el.dataset.i18nPh));

  const sk=document.querySelector(".kpi.sent");if(sk)sk.title=t("sent_help");
  renderChips();

//════════════════ 상태/공통 ════════════════
const API=location.origin.startsWith("http")?"":"http://localhost:8000";
const $=id=>document.getElementById(id);
const CV=n=>getComputedStyle(document.documentElement).getPropertyValue(n).trim();  // CSS 변수 읽기(테마 적응)
let CFG=null,CATS=[],REGIONS=[],SOURCES=[];
let region=HASH.get("r")||"ALL",lastData=null,searchKw=[],lastSearch=null;
let liveOn=false,liveTimer=null;
let assocMode=localStorage.getItem("mt_assocmode")||"cooccur",tempLinks=null;
let kwOpenTs=0;
const colorOf=id=>(CATS.find(c=>c.id===id)||{color:"#94a0b8"}).color;
const catLabel=id=>{const c=CATS.find(x=>x.id===id);return c?(lang==="ko"?c.ko:c.en):id;};
// 색상 모드: 분야(cat) / 토픽군집(cluster) / 감성(sentiment)
const CLUSTER_COLORS=["#5b8cff","#34d399","#f59e0b","#a78bfa","#fb7185","#38bdf8","#facc15","#2dd4bf","#f472b6","#c084fc","#fb923c","#4ade80"];
let colorMode=HASH.get("cm")||localStorage.getItem("mt_colormode")||"cat";
let clusterColorMap={};
function buildClusterColors(data){clusterColorMap={};(data&&data.clusters||[]).forEach((cl,i)=>{clusterColorMap[cl.id]=CLUSTER_COLORS[i%CLUSTER_COLORS.length];});}
function sentColor(s){const g="#9aa3b5";
  if(s>0.05)return d3.interpolateRgb(g,"#34d399")(Math.min(1,s));
  if(s<-0.05)return d3.interpolateRgb(g,"#fb7185")(Math.min(1,-s));return g;}
function nodeColor(d){
  if(colorMode==="cluster")return clusterColorMap[d.cluster]||"#6b7280";
  if(colorMode==="sentiment")return sentColor(d.sent||0);
  return colorOf(d.cat);}
const regionIds=()=>region==="ALL"?["KR","US"]:[region];

const tip=$("tip");
const showTip=(h,e)=>{tip.innerHTML=h;tip.style.display="block";moveTip(e);};
const moveTip=e=>{tip.style.left=Math.min(e.clientX+14,innerWidth-330)+"px";tip.style.top=(e.clientY+14)+"px";};
const hideTip=()=>tip.style.display="none";
const bind=(id,vid)=>{const s=$(id),v=$(vid);s.addEventListener("input",()=>v.textContent=s.value);};
bind("hours","hoursVal");bind("minFreq","minFreqVal");bind("maxKw","maxKwVal");bind("perFeed","perFeedVal");bind("assoc","assocVal");
function setStatus(html,busy){$("status").innerHTML=(busy?'<span class="spin"></span>':"")+html;}
function renderInsights(data){
  const box=$("insights");if(!data||!data.insights){box.innerHTML="";return;}
  const html=data.insights.map(x=>{
    if(x.type==="busiest_category")return t("ins_busiest",{cat:catLabel(x.cat),count:x.count});
    if(x.type==="top_rising")return t("ins_rising",{kw:x.kw,score:x.score})+(x.isNew?` <b style="color:var(--search)">NEW</b>`:"");
    if(x.type==="hub")return t("ins_hub",{kw:x.kw,deg:x.degree});
    if(x.type==="sentiment")return t("ins_sentiment",{label:sentWord(x.value)})+` ${sentArrow(x.value)}`;
    if(x.type==="top_cluster")return t("ins_cluster",{kws:x.keywords.slice(0,3).join("·")});
    return "";
  }).filter(Boolean).map(s=>`<span class="ins">${s}</span>`).join("");
  box.innerHTML=html;
}
function updateKPIs(data){
  $("kpiArticles").textContent=data?data.articleCount:"–";
  $("kpiKeywords").textContent=data?data.kws.length:"–";
  $("kpiClusters").textContent=data&&data.clusters?data.clusters.length:"–";
  $("kpiSources").textContent=SOURCES.filter(s=>s.enabled).length;
  const so=data?(data.sentimentOverall||0):0;
  $("kpiSentTxt").innerHTML=data?`${sentArrow(so)} ${so.toFixed(2)}`:"–";
  $("kpiSentNeedle").style.left=`${Math.round((so+1)/2*100)}%`;
}

async function init(){
  try{
    CFG=await fetch(API+"/api/config").then(r=>r.json());
    CATS=CFG.categories;REGIONS=CFG.regions;SOURCES=CFG.sources;
    $("hours").value=CFG.settings.default_hours;$("hoursVal").textContent=CFG.settings.default_hours;
    renderControls();applyLang();applyUrlState();
    $("hdrStat").textContent=t("src_active",{a:SOURCES.filter(s=>s.enabled).length,b:SOURCES.length});
  }catch(e){applyLang();setStatus(t("conn_err"));}
}
function renderControls(){
  const sel=CATS.filter(c=>c.selectable!==false);
  const DEFAULT_CATS=["BUSINESS","NATION","SCIENCE","TECHNOLOGY"];
  $("cats").innerHTML=sel.map(c=>{
    const def=DEFAULT_CATS.includes(c.id),L=lang==="ko"?c.ko:c.en;
    return `<label class="row"><span class="chip"><span class="dot" style="background:${c.color}"></span>${L}</span>
      <input type="checkbox" class="cat" value="${c.id}" ${def?"checked":""}></label>`;}).join("");
  $("sources").innerHTML=SOURCES.map(s=>{
    const badge=s.enabled?`<span class="badge on">●</span>`:`<span class="badge off">${s.requires_key?"key":"off"}</span>`;
    return `<label class="row ${s.enabled?"":"dim"}"><span>${s.label} ${badge}</span>
      <input type="checkbox" class="src" value="${s.name}" ${s.enabled?"checked":""} ${s.enabled?"":"disabled"}></label>`;}).join("");
  renderLegend();
}
function renderLegend(){
  buildClusterColors(lastData);
  const modes=[["cat",t("cm_cat")],["cluster",t("cm_cluster")],["sentiment",t("cm_sent")]];
  const ctrl=`<span class="cmode">${modes.map(([m,l])=>
    `<button data-cm="${m}" class="${colorMode===m?"on":""}">${l}</button>`).join("")}</span>`;
  let sw="";
  if(colorMode==="cat"){
    const cats=CATS.filter(c=>c.selectable!==false||lastData?.kws?.some(k=>k.cat===c.id));
    sw=cats.map(c=>`<span class="chip"><span class="dot" style="background:${c.color}"></span>${lang==="ko"?c.ko:c.en}</span>`).join("");
  }else if(colorMode==="cluster"){
    const cl=(lastData&&lastData.clusters)||[];
    const labelOf=c=>(aiLabels&&aiLabels[c.id])?aiLabels[c.id]:c.keywords.slice(0,2).join("·");
    sw=cl.length?(`<button class="ailabelbtn" id="aiLabelBtn">${t("ai_label_btn")}</button>`+
      cl.slice(0,8).map(c=>`<span class="chip"><span class="dot" style="background:${clusterColorMap[c.id]}"></span>${labelOf(c)}</span>`).join("")):`<span style="color:var(--muted)">${t("cm_cluster")}</span>`;
  }else{
    sw=`<span class="chip"><span class="dot" style="background:#fb7185"></span>${t("sent_neg")}</span>
        <span class="chip"><span class="dot" style="background:#9aa3b5"></span>${t("sent_neu")}</span>
        <span class="chip"><span class="dot" style="background:#34d399"></span>${t("sent_pos")}</span>`;
  }
  $("legend").innerHTML=ctrl+sw;
  $("legend").querySelectorAll(".cmode button").forEach(b=>b.addEventListener("click",()=>{
    colorMode=b.dataset.cm;localStorage.setItem("mt_colormode",colorMode);
    renderLegend();if(lastData)redraw();saveState();}));
  const alb=$("aiLabelBtn");if(alb)alb.addEventListener("click",loadClusterLabels);
}
async function loadClusterLabels(){
  if(!lastData||!(lastData.clusters||[]).length)return;
  const btn=$("aiLabelBtn");if(btn){btn.disabled=true;btn.textContent="…";}
  try{
    const r=await fetch(API+"/api/ai/label-clusters?"+aiParams(),{method:"POST"});
    if(r.ok){aiLabels=(await r.json()).labels||{};renderLegend();redraw();}
    else{if(btn){btn.disabled=false;btn.textContent=t("ai_label_btn");}
      setStatus(r.status===503?t("ai_disabled"):t("ai_err"));}
  }catch(e){if(btn){btn.disabled=false;btn.textContent=t("ai_label_btn");}}
}
const selected=cls=>[...document.querySelectorAll("."+cls+":checked")].map(c=>c.value);

function trendParams(){

  selected("src").forEach(v=>p.append("sources",v));

  p.set("per_feed",$("perFeed").value);p.set("assoc_threshold",$("assoc").value);

async function run(){
  if(!selected("cat").length){setStatus(t("st_pickcat"));return;}
  $("run").disabled=true;$("netEmpty").style.display="none";setStatus(t("st_analyzing"),true);
  try{
    const data=await fetch(API+"/api/trends?"+trendParams()).then(r=>r.json());
    lastData=data;aiLabels=null;tempLinks=null;renderControls();updateKPIs(data);renderInsights(data);
    if(!data.kws||!data.kws.length){setStatus(t("st_nokw"));$("run").disabled=false;return;}
    redraw();

      t:new Date().toLocaleTimeString(lang==="ko"?"ko-KR":"en-US")})
      +` · ${sLbl} ${sentArrow(so)} ${so.toFixed(2)}`);

  }catch(e){setStatus("❌ "+e.message);}

}
async function ingestNow(){
  $("ingest").disabled=true;setStatus(t("st_ingesting"),true);

}

//════════════════ 키워드 검색 ════════════════
function renderChips(){
  $("kwChips").innerHTML=searchKw.map(k=>
    `<span class="kwchip" data-kw="${encodeURIComponent(k)}"><b>${k}</b><span class="x" data-x="${encodeURIComponent(k)}">×</span></span>`).join("");
  $("kwChips").querySelectorAll(".kwchip").forEach(el=>{
    el.addEventListener("click",ev=>{if(ev.target.dataset.x)return;doSearch(decodeURIComponent(el.dataset.kw));});});
  $("kwChips").querySelectorAll(".x").forEach(el=>el.addEventListener("click",ev=>{
    ev.stopPropagation();const k=decodeURIComponent(el.dataset.x);searchKw=searchKw.filter(x=>x!==k);renderChips();}));
}
async function doSearch(q){
  q=(q||"").trim();if(!q)return;
  if(!searchKw.includes(q)){searchKw.unshift(q);searchKw=searchKw.slice(0,8);renderChips();}
  setStatus(t("st_searching",{q}),true);
  const p=new URLSearchParams({q,hours:$("hours").value,count:$("perFeed").value});regionIds().forEach(v=>p.append("regions",v));
  try{
    const data=await fetch(API+"/api/search?"+p).then(r=>r.json());
    lastSearch=data;openResults(data);
    setStatus(t("st_search_done",{q,n:data.count}));
  }catch(e){setStatus("❌ "+e.message);}
}
function openResults(data){
  $("resTitle").textContent=t("res_title",{q:data.query});
  const arts=data.articles||[];
  $("resBody").innerHTML=arts.length?arts.map(a=>{
    const dt=new Date(a.published_at*1000).toLocaleString(lang==="ko"?"ko-KR":"en-US",{month:"short",day:"numeric",hour:"2-digit",minute:"2-digit"});
    const reg=(REGIONS.find(r=>r.id===a.region)||{});
    return `<a class="artitem" href="${a.url}" target="_blank" rel="noopener">
      <div class="t">${a.title}</div>
      <div class="m"><span>${a.publisher||a.source}</span><span>${lang==="ko"?reg.ko:reg.en||a.region}</span><span>${dt}</span></div></a>`;
  }).join(""):`<div style="padding:24px;text-align:center;color:var(--muted)">${t("no_results")}</div>`;
  $("results").classList.add("open");
}
async function mergeSearch(){
  if(!lastSearch)return;
  const q=lastSearch.query;setStatus(t("st_searching",{q}),true);
  const p=new URLSearchParams({q,hours:$("hours").value,count:$("perFeed").value,store:"true"});regionIds().forEach(v=>p.append("regions",v));
  try{
    const data=await fetch(API+"/api/search?"+p).then(r=>r.json());
    setStatus(t("st_merged",{q,n:data.count}));
    $("results").classList.remove("open");
    await run();
  }catch(e){setStatus("❌ "+e.message);}
}

const sentArrow=s=>s>0.05?'<span style="color:var(--ok)">▲</span>':s<-0.05?'<span style="color:var(--err)">▼</span>':'<span style="color:var(--muted)">–</span>';
const sentWord=s=>s>0.05?t("sent_pos"):s<-0.05?t("sent_neg"):t("sent_neu");

function drawRising(data){
  const wrap=$("risingWrap");const items=(data&&data.rising)||[];
  if(!items.length){wrap.innerHTML=`<div class="empty" style="position:static;height:100%">${t("rising_empty")}</div>`;return;}

    <div class="rk">${i+1}</div>
    <div class="nm"><span class="dot" style="background:${colorOf(r.cat)};border-radius:50%"></span>${r.id}

    <div class="track"><i style="width:${Math.round(100*r.score/mx)}%;background:${colorOf(r.cat)}"></i></div>

function ensureDefs(svg){
  if(svg.select("defs").size())return;
  const d=svg.append("defs");
  const f=d.append("filter").attr("id","glow").attr("x","-60%").attr("y","-60%").attr("width","220%").attr("height","220%");
  f.append("feGaussianBlur").attr("stdDeviation","3.2").attr("result","b");
  const m=f.append("feMerge");m.append("feMergeNode").attr("in","b");m.append("feMergeNode").attr("in","SourceGraphic");
  // 드롭 섀도(입체감)
  const ds=d.append("filter").attr("id","drop").attr("x","-40%").attr("y","-40%").attr("width","180%").attr("height","180%");
  ds.append("feDropShadow").attr("dx",0).attr("dy",1.5).attr("stdDeviation",2.6)
    .attr("flood-color","#000").attr("flood-opacity",.28);
  // 광택(흰색 하이라이트) — 어떤 색 위에도 글로시한 구체 느낌(은은하게)

  gl.append("stop").attr("offset","45%").attr("stop-color","#fff").attr("stop-opacity",".08");

}

//──────────── 연관 엣지 소스(동시출현/동시추세) ────────────
function currentLinks(){return assocMode==="temporal"?(tempLinks||[]):((lastData&&lastData.links)||[]);}
async function loadTemporal(){
  if(!lastData)return;
  const p=new URLSearchParams({metric:"temporal",hours:$("hours").value,top:"28",buckets:"24"});
  selected("cat").forEach(v=>p.append("categories",v));regionIds().forEach(v=>p.append("regions",v));
  try{
    const cm=await fetch(API+"/api/correlation?"+p).then(r=>r.json());
    const ks=cm.keywords||[],M=cm.matrix||[],th=Math.max(0.5,+$("assoc").value),cand=[];
    for(let i=0;i<ks.length;i++)for(let j=i+1;j<ks.length;j++){const r=M[i][j];
      if(r>=th)cand.push({source:ks[i],target:ks[j],npmi:r,value:r});}
    // 노드별 상위 3개만 유지(백본) → 중앙으로 뭉치는 헤어볼 방지
    const byN={};cand.forEach(e=>{(byN[e.source]=byN[e.source]||[]).push(e);(byN[e.target]=byN[e.target]||[]).push(e);});
    const keep=new Set();
    Object.values(byN).forEach(es=>{es.sort((a,b)=>b.npmi-a.npmi);es.slice(0,3).forEach(e=>keep.add(e.source+"|"+e.target));});
    tempLinks=cand.filter(e=>keep.has(e.source+"|"+e.target));
  }catch(e){tempLinks=[];}
}

  if(assocMode==="temporal"&&!tempLinks){setStatus(t("ai_loading"),true);await loadTemporal();setStatus("");}
  if(lastData)drawNetwork(lastData);}));
$("assocMode").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.am===assocMode));

let netSim=null;
function drawNetwork(data){
  const svg=d3.select("#netSvg");svg.selectAll("*").remove();ensureDefs(svg);
  const el=$("netSvg"),W=el.clientWidth,H=el.clientHeight;
  if(netSim)netSim.stop();
  const g=svg.append("g");
  svg.call(d3.zoom().scaleExtent([.3,4]).on("zoom",ev=>g.attr("transform",ev.transform)));
  const nodes=data.kws.map(d=>({...d}));
  const nIds=new Set(nodes.map(n=>n.id));
  const links=currentLinks().filter(l=>nIds.has(l.source.id||l.source)&&nIds.has(l.target.id||l.target)).map(d=>({...d}));
  const mx=d3.max(nodes,d=>d.freq)||1,rOf=d=>6+20*Math.sqrt(d.freq/mx);
  netSim=d3.forceSimulation(nodes)
    .force("link",d3.forceLink(links).id(d=>d.id).distance(d=>56-30*(d.npmi||0)).strength(d=>.2+.5*(d.npmi||0)))
    .force("charge",d3.forceManyBody().strength(-200))
    .force("center",d3.forceCenter(W/2,H/2))
    .force("collide",d3.forceCollide(d=>rOf(d)+12));
  const nById=Object.fromEntries(nodes.map(n=>[n.id,n]));
  const isTemporal=assocMode==="temporal";
  const link=g.append("g").selectAll("path").data(links).join("path")
    .attr("fill","none").attr("stroke-linecap","round").style("cursor","pointer")
    .attr("stroke",d=>nodeColor(nById[d.source.id||d.source]||{}))
    .attr("stroke-opacity",d=>.12+.5*(d.npmi||0)).attr("stroke-width",d=>1+4*(d.npmi||0));
  link.on("mouseover",(e,d)=>{const a=d.source.id||d.source,b=d.target.id||d.target;
    showTip(`<b>${a} ↔ ${b}</b><br>${isTemporal?(lang==="ko"?"동조 상관":"co-movement"):"NPMI"} ${(d.npmi||0).toFixed(2)}${d.count?` · ${lang==="ko"?"공유":"shared"} ${d.count}`:""}<br><span style="color:var(--muted)">${lang==="ko"?"클릭: AI 관계 설명":"click: AI explain"}</span>`,e);})
    .on("mousemove",moveTip).on("mouseout",hideTip)
    .on("click",(e,d)=>explainPair(d.source.id||d.source,d.target.id||d.target));
  const node=g.append("g").selectAll("g").data(nodes).join("g").style("cursor","pointer").call(drag(netSim));
  const sInk=CV("--stageInk"),sStroke=CV("--stageStroke");
  node.append("circle").attr("r",rOf).attr("fill",d=>nodeColor(d))
    .attr("stroke",sStroke).attr("stroke-width",1.5).attr("filter","url(#glow)").attr("fill-opacity",.92);
  node.append("text").attr("text-anchor","middle").attr("dy",d=>-rOf(d)-5)
    .attr("fill",sInk).attr("font-size",d=>d.freq>=mx*.5?13:11).attr("font-weight",700)
    .attr("stroke",sStroke).attr("stroke-width",3).attr("paint-order","stroke")
    .style("display",d=>d.freq>=mx*.16?null:"none").text(d=>d.id);
  node.on("mouseover",(e,d)=>{
    const cats=Object.entries(d.catScore).map(([k,v])=>`${catLabel(k)} ${v}`).join(" · ");
    const arts=(d.articles||[]).map(a=>`· ${a.title}${a.publisher?` <span style="color:var(--muted)">(${a.publisher})</span>`:""}`).join("<br>");
    const sLbl=lang==="ko"?"감성":"sentiment";
    const clab=(colorMode==="cluster"&&aiLabels&&aiLabels[d.cluster])?` · 🧩 ${aiLabels[d.cluster]}`:"";
    showTip(`<b>${d.id}</b> — ${d.freq} · ${sLbl} ${sentArrow(d.sent||0)} ${sentWord(d.sent||0)}${clab}<br><span style="color:var(--muted)">${cats}</span><br><br>${arts}`,e);
    const adj=new Set();links.forEach(l=>{const s=l.source.id,tt=l.target.id;if(s===d.id)adj.add(tt);if(tt===d.id)adj.add(s);});
    link.attr("stroke-opacity",l=>l.source.id===d.id||l.target.id===d.id?.9:.04);
    node.style("opacity",n=>n.id===d.id||adj.has(n.id)?1:.18);})
   .on("mousemove",moveTip)
   .on("mouseout",()=>{hideTip();link.attr("stroke-opacity",l=>.12+.5*(l.npmi||0));node.style("opacity",1);})
   .on("click",(e,d)=>{if(!e.defaultPrevented)openKeyword(d.id);});
  netSim.on("tick",()=>{
    link.attr("d",d=>{const x1=d.source.x,y1=d.source.y,x2=d.target.x,y2=d.target.y;
      const dr=Math.hypot(x2-x1,y2-y1)*1.6;return `M${x1},${y1}A${dr},${dr} 0 0,1 ${x2},${y2}`;});
    node.attr("transform",d=>`translate(${d.x},${d.y})`);});
  const top=data.kws.slice(0,10),tm=top[0]?.freq||1;
  $("topList").innerHTML=top.map(d=>
    `<div class="bar"><div class="bx" style="width:${10+70*d.freq/tm}px;background:${colorOf(d.cat)}"></div>
     <div class="bn">${d.id}</div><div class="bc">${d.freq}</div></div>`).join("");
}
function drag(sim){return d3.drag()
  .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y;})
  .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
  .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;});}

function drawCloud(data){
  const svg=d3.select("#cloudSvg");svg.selectAll("*").remove();
  const el=$("cloudSvg"),W=el.clientWidth,H=el.clientHeight;
  // 부드러운 구름 배경

  rg.append("stop").attr("offset","100%").attr("stop-color",CV("--stage")||"#0b0e16").attr("stop-opacity","0");
  const blur=defs.append("filter").attr("id","soft");

  svg.append("ellipse").attr("cx",W/2).attr("cy",H/2).attr("rx",W*.42).attr("ry",H*.4).attr("fill","url(#cloudbg)");
  const mx=d3.max(data.kws,d=>d.freq)||1,mn=d3.min(data.kws,d=>d.freq)||1;

  const op=d3.scaleLinear().domain([mn,mx]).range([.6,1]);
  const words=data.kws.map(d=>({text:d.id,size:sc(d.freq),cat:d.cat,cluster:d.cluster,sent:d.sent,freq:d.freq,op:op(d.freq)}));
  const angles=[0,0,0,0,90,-30,30];
  d3.layout.cloud().size([W,H]).words(words).padding(2.4).font("Apple SD Gothic Neo")

        .on("mouseover",function(e,d){d3.select(this).style("fill-opacity",1).attr("filter","url(#glow2)");
          showTip(`<b>${d.text}</b> — ${d.freq} · ${catLabel(d.cat)} · ${sentWord(d.sent||0)}`,e);})
        .on("mousemove",moveTip)
        .on("mouseout",function(e,d){d3.select(this).style("fill-opacity",d.op).attr("filter",null);hideTip();})
        .on("click",(e,d)=>openKeyword(d.text));
      // 글로우 필터(호버용)
      const f=defs.append("filter").attr("id","glow2").attr("x","-60%").attr("y","-60%").attr("width","220%").attr("height","220%");
      f.append("feGaussianBlur").attr("stdDeviation","2.6").attr("result","b");
      const m=f.append("feMerge");m.append("feMergeNode").attr("in","b");m.append("feMergeNode").attr("in","SourceGraphic");
    }).start();
}

//──────────── 분야별 버블(fancy) ────────────
function drawBubble(data){
  const svg=d3.select("#bubbleSvg");svg.selectAll("*").remove();ensureDefs(svg);
  const el=$("bubbleSvg"),W=el.clientWidth,H=el.clientHeight;
  const active=CATS.filter(c=>data.kws.some(k=>k.cat===c.id));
  if(!active.length)return;
  const colW=W/active.length,pad=10,xOf={};active.forEach((c,i)=>xOf[c.id]=colW*i+colW/2);
  const g=svg.append("g");
  // 분야 레인 배경 + 헤더 pill
  active.forEach((c,i)=>{
    g.append("rect").attr("x",colW*i+pad/2).attr("y",8).attr("width",colW-pad).attr("height",H-16).attr("rx",16)
      .attr("fill",c.color).attr("fill-opacity",.05).attr("stroke",c.color).attr("stroke-opacity",.18);
    const cnt=((data.categorySummary||[]).find(s=>s.id===c.id)||{}).count||data.kws.filter(k=>k.cat===c.id).length;
    const pill=g.append("g").attr("transform",`translate(${colW*i+colW/2},28)`);
    pill.append("rect").attr("x",-52).attr("y",-14).attr("width",104).attr("height",26).attr("rx",13)
      .attr("fill",c.color).attr("filter","url(#drop)");
    pill.append("text").attr("text-anchor","middle").attr("dy",".32em").attr("fill","#0b0d13")
      .attr("font-weight",800).attr("font-size",12.5).text(`${lang==="ko"?c.ko:c.en} · ${cnt}`);
  });
  const mx=d3.max(data.kws,d=>d.freq)||1,rOf=d=>9+26*Math.sqrt(d.freq/mx);
  const nodes=data.kws.map(d=>({...d}));
  const sim=d3.forceSimulation(nodes).force("x",d3.forceX(d=>xOf[d.cat]||W/2).strength(.55))
    .force("y",d3.forceY(H/2+26).strength(.05)).force("collide",d3.forceCollide(d=>rOf(d)+2)).stop();
  for(let i=0;i<300;i++)sim.tick();
  nodes.forEach(n=>{const i=Math.max(0,active.findIndex(c=>c.id===n.cat));const lx=colW*i+pad,rx=colW*i+colW-pad;
    n.x=Math.max(lx+rOf(n),Math.min(rx-rOf(n),n.x));n.y=Math.max(52+rOf(n),Math.min(H-10-rOf(n),n.y));});
  const node=g.selectAll("g.bn").data(nodes).join("g").attr("class","bn").style("cursor","pointer")
    .attr("transform",d=>`translate(${d.x},${d.y})`);
  node.append("circle").attr("r",rOf).attr("fill",d=>nodeColor(d)).attr("filter","url(#drop)");
  node.append("circle").attr("r",rOf).attr("fill","url(#gloss)").attr("pointer-events","none");
  node.append("text").attr("dy",".32em").attr("text-anchor","middle").attr("fill","#0b0d13")
    .attr("font-weight",800).attr("font-size",d=>Math.min(13,rOf(d)*.62))
    .style("display",d=>rOf(d)>16?null:"none").text(d=>d.id);
  node.on("mouseover",function(e,d){d3.select(this).raise().selectAll("circle").attr("transform","scale(1.13)");
      showTip(`<b>${d.id}</b> — ${d.freq} · ${catLabel(d.cat)} · ${sentWord(d.sent||0)}`,e);})
   .on("mousemove",moveTip)
   .on("mouseout",function(){d3.select(this).selectAll("circle").attr("transform",null);hideTip();})
   .on("click",(e,d)=>openKeyword(d.id));
}

//──────────── 트리맵 ────────────
function drawTreemap(data){
  const svg=d3.select("#treeSvg");svg.selectAll("*").remove();ensureDefs(svg);
  const el=$("treeSvg"),W=el.clientWidth,H=el.clientHeight;
  if(!data.kws.length)return;
  const byCat=d3.group(data.kws,d=>d.cat);
  const root={name:"root",children:[...byCat].map(([cat,kws])=>
    ({name:cat,cat,children:kws.map(k=>({name:k.id,value:k.freq,d:k}))}))};
  const h=d3.hierarchy(root).sum(d=>d.value||0).sort((a,b)=>b.value-a.value);
  d3.treemap().tile(d3.treemapSquarify.ratio(1)).size([W,H]).paddingInner(3).paddingTop(24).paddingOuter(3).round(true)(h);

function mdToHtml(md){
  if(!md)return"";
  let s=md.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  s=s.replace(/`([^`]+)`/g,"<code>$1</code>")
     .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
     .replace(/(?<![*\w])\*([^*\n]+)\*(?!\*)/g,"<em>$1</em>");
  const lines=s.split("\n"),out=[];let ul=false,ol=false;
  const close=()=>{if(ul){out.push("</ul>");ul=false;}if(ol){out.push("</ol>");ol=false;}};
  for(const ln of lines){
    let m=ln.match(/^\s*#{1,6}\s+(.*)$/);
    if(m){close();out.push("<h4>"+m[1]+"</h4>");continue;}
    if(m=ln.match(/^\s*[-*•]\s+(.*)$/)){if(ol){out.push("</ol>");ol=false;}if(!ul){out.push("<ul>");ul=true;}out.push("<li>"+m[1]+"</li>");continue;}
    if(m=ln.match(/^\s*\d+[.)]\s+(.*)$/)){if(ul){out.push("</ul>");ul=false;}if(!ol){out.push("<ol>");ol=true;}out.push("<li>"+m[1]+"</li>");continue;}
    if(ln.trim()===""){close();continue;}
    close();out.push("<p>"+ln+"</p>");
  }
  close();return out.join("");
}
const fmtAI=s=>mdToHtml(s);

async function exportImage(){
  const pane=document.querySelector(".pane.active");
  const svg=pane&&pane.querySelector("svg");
  if(!svg){setStatus(t("img_none"));return;}
  const W=svg.clientWidth||svg.getBoundingClientRect().width||900;
  const H=svg.clientHeight||svg.getBoundingClientRect().height||600;
  const clone=svg.cloneNode(true);
  clone.setAttribute("xmlns","http://www.w3.org/2000/svg");
  clone.setAttribute("width",W);clone.setAttribute("height",H);
  const bg=document.createElementNS("http://www.w3.org/2000/svg","rect");
  bg.setAttribute("width",W);bg.setAttribute("height",H);bg.setAttribute("fill",CV("--stage"));
  clone.insertBefore(bg,clone.firstChild);
  const xml=new XMLSerializer().serializeToString(clone);
  const url="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(xml)));
  const img=new Image();
  img.onload=()=>{
    const sc=2,cv=document.createElement("canvas");cv.width=W*sc;cv.height=H*sc;
    const ctx=cv.getContext("2d");ctx.scale(sc,sc);ctx.drawImage(img,0,0);
    cv.toBlob(async b=>{
      const name=`mytrend_${document.querySelector(".tab.active").dataset.v}.png`;
      try{await navigator.clipboard.write([new ClipboardItem({"image/png":b})]);setStatus(t("img_copied"));}
      catch(e){const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;
        document.body.appendChild(a);a.click();a.remove();setStatus(t("img_saved"));}
    },"image/png");
  };
  img.onerror=()=>setStatus(t("img_none"));
  img.src=url;
}

function drawRadar(data){
  const svg=d3.select("#radarSvg"),el=$("radarSvg"),W=el.clientWidth,H=el.clientHeight;
  svg.selectAll("*").remove();ensureDefs(svg);
  const R=(data&&data.radar)||[];
  if(!R.length){svg.append("text").attr("x",W/2).attr("y",H/2).attr("text-anchor","middle").attr("fill",CV("--muted")).text(t("st_nokw"));return;}
  const m={l:56,r:20,t:30,b:42},mut=CV("--muted"),line=CV("--line"),ink=CV("--stageInk"),strk=CV("--stageStroke");
  const x=d3.scaleLinear().domain([-1,1]).range([m.l,W-m.r]);
  const maxV=d3.max(R,d=>d.volume)||1,y=d3.scaleSqrt().domain([0,maxV]).range([H-m.b,m.t]);
  const vmed=d3.median(R,d=>d.volume)||1,x0=x(0),ym=y(vmed);
  const g=svg.append("g");
  // 사분면 배경 틴트(라운드)
  [["#34d399",x0,m.t,W-m.r-x0,ym-m.t],["#f59e0b",m.l,m.t,x0-m.l,ym-m.t],
   ["#5b8cff",x0,ym,W-m.r-x0,H-m.b-ym],["#fb7185",m.l,ym,x0-m.l,H-m.b-ym]]
   .forEach(([c,X,Y,Wd,Ht])=>g.append("rect").attr("x",X+2).attr("y",Y+2).attr("rx",12)
     .attr("width",Math.max(0,Wd-4)).attr("height",Math.max(0,Ht-4)).attr("fill",c).attr("fill-opacity",.08));
  // 분할선
  g.append("line").attr("x1",x0).attr("x2",x0).attr("y1",m.t).attr("y2",H-m.b).attr("stroke",line).attr("stroke-dasharray","4 4");
  g.append("line").attr("x1",m.l).attr("x2",W-m.r).attr("y1",ym).attr("y2",ym).attr("stroke",line).attr("stroke-dasharray","4 4");
  // 사분면 라벨(이모지 pill)
  const QEMO={hot:"🔥",established:"🏛",emerging:"🌱",fading:"💧"};
  [["hot",W-m.r-8,m.t+18,"end"],["established",m.l+8,m.t+18,"start"],["emerging",W-m.r-8,H-m.b-12,"end"],["fading",m.l+8,H-m.b-12,"start"]]
   .forEach(([q,X,Y,a])=>{const wp=84,gp=g.append("g");
     gp.append("rect").attr("x",a==="end"?X-wp:X).attr("y",Y-15).attr("width",wp).attr("height",23).attr("rx",11)
       .attr("fill",CV("--card")).attr("stroke",CV("--line")).attr("opacity",.92);
     gp.append("text").attr("x",a==="end"?X-10:X+10).attr("y",Y).attr("text-anchor",a)
       .attr("fill",mut).attr("font-weight",800).attr("font-size",12).text(`${QEMO[q]} ${t("rq_"+q)}`);});
  // 축 라벨
  g.append("text").attr("x",(m.l+W-m.r)/2).attr("y",H-8).attr("text-anchor","middle").attr("fill",mut).attr("font-size",11).text(t("radar_x"));
  g.append("text").attr("transform",`translate(15,${(m.t+H-m.b)/2}) rotate(-90)`).attr("text-anchor","middle").attr("fill",mut).attr("font-size",11).text(t("radar_y"));
  // 버블 — force 충돌로 겹침 분리(원래 데이터 위치 근처를 유지하며 흩뜨림)
  const md=d3.max(R,d=>d.degree)||1,rOf=d=>5+11*Math.sqrt((d.degree||0)/md);
  const nodes=R.map(d=>{const n={...d};n.tx=x(d.momentum);n.ty=y(d.volume);n.x=n.tx;n.y=n.ty;return n;});
  d3.forceSimulation(nodes)
    .force("x",d3.forceX(d=>d.tx).strength(.75))
    .force("y",d3.forceY(d=>d.ty).strength(.75))
    .force("collide",d3.forceCollide(d=>rOf(d)+2.6).iterations(2))
    .stop().tick(230);
  nodes.forEach(n=>{n.x=Math.max(m.l+rOf(n),Math.min(W-m.r-rOf(n),n.x));
                    n.y=Math.max(m.t+rOf(n),Math.min(H-m.b-rOf(n),n.y));});
  // 라벨은 상위(볼륨·연결 기준) 위주로만 표시해 글자 겹침 최소화
  const labelSet=new Set(nodes.slice().sort((a,b)=>(b.volume+b.degree)-(a.volume+a.degree)).slice(0,28).map(n=>n.id));
  const node=g.selectAll("g.rn").data(nodes).join("g").attr("class","rn").style("cursor","pointer")
    .attr("transform",d=>`translate(${d.x},${d.y})`);
  node.append("circle").attr("r",rOf).attr("fill",d=>nodeColor(d)).attr("filter","url(#drop)");
  node.append("circle").attr("r",rOf).attr("fill","url(#gloss)").attr("pointer-events","none");
  node.append("text").attr("dy",d=>-rOf(d)-3).attr("text-anchor","middle").attr("fill",ink).attr("font-size",11).attr("font-weight",700)
    .attr("stroke",strk).attr("stroke-width",2.5).attr("paint-order","stroke")
    .style("display",d=>labelSet.has(d.id)?null:"none").text(d=>d.id);
  node.on("mouseover",function(e,d){d3.select(this).raise().selectAll("circle").attr("transform","scale(1.18)");
      d3.select(this).select("text").style("display",null);
      showTip(`<b>${d.id}</b> · ${t("rq_"+d.quadrant)}<br>${lang==="ko"?"볼륨":"vol"} ${d.volume} · ${lang==="ko"?"모멘텀":"mom"} ${d.momentum>0?"+":""}${d.momentum} · ${lang==="ko"?"연결":"links"} ${d.degree}`,e);})
    .on("mousemove",moveTip)
    .on("mouseout",function(e,d){d3.select(this).selectAll("circle").attr("transform",null);
      if(!labelSet.has(d.id))d3.select(this).select("text").style("display","none");hideTip();})
    .on("click",(e,d)=>openKeyword(d.id));
}

//──────────── 히스토리(장기 분석) ────────────
let histDaily=null,histKw="",histIv="day";
function bucketHist(days,iv){
  if(iv==="day")return days.map(p=>({period:p.period,count:p.count,sentiment:p.sentiment}));
  const agg={};
  days.forEach(p=>{let key=iv==="month"?p.period.slice(0,7):(()=>{const d=new Date(p.period);const dow=(d.getUTCDay()+6)%7;d.setUTCDate(d.getUTCDate()-dow);return d.toISOString().slice(0,10);})();
    if(!agg[key])agg[key]=[0,0];agg[key][0]+=p.count;agg[key][1]+=p.count*p.sentiment;});
  return Object.keys(agg).sort().map(k=>({period:k,count:agg[k][0],sentiment:agg[k][0]?+(agg[k][1]/agg[k][0]).toFixed(3):0}));
}
async function loadHistory(kw){
  kw=(kw||"").trim();if(!kw)return;histKw=kw;
  $("histInfo").innerHTML=`<span class="spin"></span>`;
  const p=new URLSearchParams({keyword:kw,days:$("histDays").value,interval:"day"});regionIds().forEach(v=>p.append("regions",v));
  try{
    const h=await fetch(API+"/api/history?"+p).then(r=>r.json());
    histDaily=h.points||[];
    drawHistLine();drawCalendar();
    // 계절성 + 정보
    const sp=new URLSearchParams({keyword:kw,days:Math.max(400,+$("histDays").value)});regionIds().forEach(v=>sp.append("regions",v));
    const se=await fetch(API+"/api/seasonality?"+sp).then(r=>r.json()).catch(()=>({cycles:[]}));
    const total=histDaily.reduce((a,b)=>a+b.count,0);
    const peak=histDaily.reduce((m,b)=>b.count>m.count?b:m,{count:0,period:"-"});
    const seas=(se.cycles||[]).filter(c=>c.seasonal).map(c=>({weekly:"주간",monthly:"월간",yearly:"연간"}[c.cycle]||c.cycle));
    $("histInfo").innerHTML=
      `<span class="hchip">${t("hist_total")} <b>${total}</b></span>`+
      `<span class="hchip">${t("hist_peak")} <b>${peak.period}</b> (${peak.count})</span>`+
      `<span class="hchip">${t("hist_seasonal")} <b>${seas.length?seas.join("·"):"—"}</b></span>`;
  }catch(e){$("histInfo").innerHTML=`<span class="hchip">${t("ai_err")}</span>`;}
}
function drawHistLine(){
  const svg=d3.select("#histLine"),el=$("histLine"),W=el.clientWidth,H=el.clientHeight;
  svg.selectAll("*").remove();ensureDefs(svg);
  const pts=bucketHist(histDaily||[],histIv);
  if(!pts.length){svg.append("text").attr("x",W/2).attr("y",H/2).attr("text-anchor","middle").attr("fill",CV("--muted")).text(t("hist_none"));return;}
  const m={l:40,r:14,t:14,b:24},mut=CV("--muted"),acc=CV("--accent");
  const x=d3.scalePoint().domain(pts.map(p=>p.period)).range([m.l,W-m.r]);
  const maxC=d3.max(pts,p=>p.count)||1,y=d3.scaleLinear().domain([0,maxC]).range([H-m.b,m.t]);
  const g=svg.append("g");
  g.append("line").attr("x1",m.l).attr("x2",W-m.r).attr("y1",H-m.b).attr("y2",H-m.b).attr("stroke",CV("--line"));
  const area=d3.area().x(p=>x(p.period)).y0(H-m.b).y1(p=>y(p.count)).curve(d3.curveMonotoneX);
  const line=d3.line().x(p=>x(p.period)).y(p=>y(p.count)).curve(d3.curveMonotoneX);
  g.append("path").datum(pts).attr("d",area).attr("fill",acc).attr("fill-opacity",.15);
  g.append("path").datum(pts).attr("d",line).attr("fill","none").attr("stroke",acc).attr("stroke-width",2);
  g.selectAll("circle").data(pts).join("circle").attr("cx",p=>x(p.period)).attr("cy",p=>y(p.count)).attr("r",2.5)
    .attr("fill",p=>sentColor(p.sentiment)).style("cursor","pointer")
    .on("mouseover",(e,p)=>showTip(`<b>${p.period}</b><br>${t("hist_total")} ${p.count} · ${sentWord(p.sentiment)}`,e)).on("mousemove",moveTip).on("mouseout",hideTip);
  // x축 라벨(약 6개)
  const step=Math.ceil(pts.length/6);
  g.selectAll("text.xl").data(pts.filter((p,i)=>i%step===0)).join("text").attr("class","xl")
    .attr("x",p=>x(p.period)).attr("y",H-8).attr("text-anchor","middle").attr("fill",mut).attr("font-size",10).text(p=>p.period.slice(5));
  g.append("text").attr("x",m.l-6).attr("y",m.t+4).attr("text-anchor","end").attr("fill",mut).attr("font-size",10).text(maxC);
}
function drawCalendar(){
  const wrap=$("histCal");wrap.innerHTML="";
  const days=histDaily||[];if(!days.length)return;
  const map={};days.forEach(p=>map[p.period]=p.count);
  const start=new Date(days[0].period+"T00:00:00Z"),end=new Date(days[days.length-1].period+"T00:00:00Z");
  const cell=13,gap=3,maxC=d3.max(days,p=>p.count)||1;
  const col=d3.interpolateRgb(CV("--panel2"),CV("--accent"));
  const startMon=new Date(start);startMon.setUTCDate(start.getUTCDate()-((start.getUTCDay()+6)%7));
  const weeks=Math.ceil((end-startMon)/(7*864e5))+1;
  const W=weeks*(cell+gap)+40,H=7*(cell+gap)+20;
  const svg=d3.select(wrap).append("svg").attr("width",W).attr("height",H);
  for(let d=new Date(startMon);d<=end;d.setUTCDate(d.getUTCDate()+1)){
    const iso=d.toISOString().slice(0,10);const wi=Math.floor((d-startMon)/(7*864e5));const dow=(d.getUTCDay()+6)%7;
    const c=map[iso]||0,inRange=d>=start;
    svg.append("rect").attr("x",30+wi*(cell+gap)).attr("y",14+dow*(cell+gap)).attr("width",cell).attr("height",cell).attr("rx",2)
      .attr("fill",inRange?(c?col(Math.min(1,c/maxC)):CV("--panel2")):"transparent").attr("stroke",inRange?CV("--line"):"none").attr("stroke-width",.5)
      .style("cursor","pointer").on("mouseover",(e)=>showTip(`<b>${iso}</b> · ${c}`,e)).on("mousemove",moveTip).on("mouseout",hideTip);
  }
  ["월","수","금"].forEach((lbl,i)=>svg.append("text").attr("x",26).attr("y",14+(i*2)*(cell+gap)+cell-2).attr("text-anchor","end").attr("fill",CV("--muted")).attr("font-size",9).text(lang==="ko"?lbl:["Mon","Wed","Fri"][i]));
}
function drawHistory(){if(histDaily){drawHistLine();drawCalendar();}else loadBreakouts();}
async function loadBreakouts(){
  const info=$("histInfo");info.innerHTML=`<span class="hchip" style="color:var(--muted)">${t("hist_desc")}</span>`;
  try{
    const p=new URLSearchParams({recent_days:"7",baseline_days:"90",z_min:"2"});regionIds().forEach(v=>p.append("regions",v));
    const list=(await fetch(API+"/api/breakouts?"+p).then(r=>r.json())).breakouts||[];
    if(!list.length)return;
    info.innerHTML=`<div style="width:100%;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px">🚨 ${t("hist_breakout")}</div>`+
      list.slice(0,14).map(x=>`<span class="hchip" style="cursor:pointer" data-bk="${encodeURIComponent(x.id)}">${x.id} <b>z${x.z}</b></span>`).join("");
    info.querySelectorAll("[data-bk]").forEach(el=>el.addEventListener("click",()=>{const k=decodeURIComponent(el.dataset.bk);$("histInput").value=k;loadHistory(k);}));
  }catch(e){}
}
async function histAiReading(){
  if(!histKw)return;const out=$("histAiOut");out.innerHTML=`<span class="spin"></span> ${t("ai_loading")}`;
  try{const p=new URLSearchParams({q:`'${histKw}' 키워드의 장기 추이와 의미를 분석해줘`,lang,hours:"24"});regionIds().forEach(v=>p.append("regions",v));
    if(aiModel)p.set("model",aiModel);
    const r=await fetch(API+"/api/ai/ask?"+p,{method:"POST"});
    out.innerHTML='<button class="aiclose" title="close">×</button>'+(r.ok?fmtAI((await r.json()).answer):(r.status===503?t("ai_disabled"):t("ai_err")));
  }catch(e){out.textContent=t("ai_err");}
}
$("histBtn").addEventListener("click",()=>loadHistory($("histInput").value));
$("histInput").addEventListener("keydown",e=>{if(e.key==="Enter")loadHistory($("histInput").value);});
$("histInterval").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
  histIv=b.dataset.iv;$("histInterval").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));drawHistLine();}));
$("histDays").addEventListener("change",()=>{if(histKw)loadHistory(histKw);});

// 라이브 자동갱신
function toggleLive(){liveOn=!liveOn;$("live").classList.toggle("on",liveOn);
  if(liveTimer){clearInterval(liveTimer);liveTimer=null;}
  if(liveOn)liveTimer=setInterval(()=>{if(lastData&&!$("run").disabled)run();},60000);}

// URL 해시로 상태 공유/복원
function saveState(){
  const p=new URLSearchParams();
  p.set("r",region);p.set("lang",lang);p.set("th",theme);p.set("cm",colorMode);
  p.set("h",$("hours").value);p.set("mf",$("minFreq").value);p.set("mk",$("maxKw").value);p.set("pf",$("perFeed").value);
  p.set("c",selected("cat").join(","));p.set("v",document.querySelector(".tab.active").dataset.v);
  history.replaceState(null,"","#"+p.toString());
}
function applyUrlState(){
  ["hours","minFreq","maxKw","perFeed"].forEach((id,i)=>{
    const k=["h","mf","mk","pf"][i],v=HASH.get(k);
    if(v){$(id).value=v;const lbl={hours:"hoursVal",minFreq:"minFreqVal",maxKw:"maxKwVal",perFeed:"perFeedVal"}[id];$(lbl).textContent=v;}});
  $("regionSeg").querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.region===region));
  if(HASH.get("c")){const want=new Set(HASH.get("c").split(",").filter(Boolean));
    document.querySelectorAll(".cat").forEach(cb=>cb.checked=want.has(cb.value));}
  const v=HASH.get("v");if(v){const tb=document.querySelector(`.tab[data-v="${v}"]`);if(tb)tb.click();}
}

// 키보드 단축키
document.addEventListener("keydown",e=>{
  const tag=(e.target.tagName||"").toLowerCase();
  if(e.key==="Escape"){["results","kwDrawer","aiDrawer"].forEach(id=>$(id).classList.remove("open"));return;}
  if(tag==="input"||tag==="textarea")return;
  if(e.metaKey||e.ctrlKey||e.altKey)return;
  if(e.key==="/"){e.preventDefault();$("kwInput").focus();}
  else if(e.key==="g")run();
  else if(e.key==="a")openAI();
  else if(e.key==="t")$("themeBtn").click();
  else if(e.key==="l"){lang=lang==="ko"?"en":"ko";localStorage.setItem("mt_lang",lang);applyLang();saveState();}
  else if(/^[1-8]$/.test(e.key)){const tabs=document.querySelectorAll(".tab");if(tabs[+e.key-1])tabs[+e.key-1].click();}
});
$("regionSeg").querySelectorAll("button").forEach(b=>b.addEventListener("click",()=>{
  region=b.dataset.region;$("regionSeg").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));
  saveState();if(lastData)run();}));
document.querySelectorAll(".tab").forEach(tb=>tb.addEventListener("click",()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".pane").forEach(x=>x.classList.remove("active"));
  tb.classList.add("active");document.querySelector(`.pane[data-v="${tb.dataset.v}"]`).classList.add("active");
  if(tb.dataset.v==="history")drawHistory();else if(lastData)redraw();
  saveState();}));
window.addEventListener("resize",()=>{if(lastData)redraw();});

applyTheme();
init();
