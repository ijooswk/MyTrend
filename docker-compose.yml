services:
  mytrend:
    build:
      context: .
      dockerfile: Dockerfile
    image: mytrend:latest
    container_name: mytrend
    restart: unless-stopped
    ports:
      - "${MYTREND_PORT:-8000}:8000"
    environment:
      MYTREND_DB_PATH: /app/data/mytrend.db
      MYTREND_INGEST_INTERVAL_MIN: "${MYTREND_INGEST_INTERVAL_MIN:-20}"
      MYTREND_DEFAULT_HOURS: "${MYTREND_DEFAULT_HOURS:-24}"
      MYTREND_PER_FEED_LIMIT: "${MYTREND_PER_FEED_LIMIT:-60}"
      MYTREND_CACHE_TTL: "${MYTREND_CACHE_TTL:-120}"
      MYTREND_INGEST_ON_START: "${MYTREND_INGEST_ON_START:-true}"
      # API 키 (없으면 해당 소스 자동 비활성). 루트 .env 에서 주입.
      TAVILY_API_KEY: "${TAVILY_API_KEY:-}"
      EODHD_API_KEY: "${EODHD_API_KEY:-}"
      EODHD_API_TOKEN: "${EODHD_API_TOKEN:-}"
      NEWSAPI_KEY: "${NEWSAPI_KEY:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      MYTREND_AI_MODEL: "${MYTREND_AI_MODEL:-openai/gpt-4o-mini}"
    volumes:
      - mytrend_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mytrend_data:
